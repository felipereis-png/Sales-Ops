<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moveo Sales Ops — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #07090f;
    --surface: #0d1117;
    --surface2: #131a26;
    --surface3: #1a2438;
    --border: rgba(255,255,255,0.07);
    --border-accent: rgba(56,139,255,0.2);
    --accent: #388bff;
    --accent-glow: rgba(56,139,255,0.18);
    --accent2: #00c896;
    --accent3: #ff5370;
    --accent4: #ffb347;
    --accent5: #a78bfa;
    --text: #cdd9e5;
    --text2: #768390;
    --text3: #3d4f63;
    --won: #00c896;
    --lost: #ff5370;
    --funnel1: #388bff;
    --funnel2: #a78bfa;
    --funnel3: #38d9f5;
    --funnel4: #ffb347;
    --funnel5: #f472b6;
    --growth: #00c896;
    --enterprise: #388bff;
    --r: 10px;
    --r-sm: 7px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 228px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width .2s ease; overflow: hidden; }
  .sidebar.collapsed { width: 54px; }
  .sidebar.collapsed .logo-text,
  .sidebar.collapsed .subtitle,
  .sidebar.collapsed .nav-group,
  .sidebar.collapsed .nav-label { display: none; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 8px 0; gap: 0; }
  .sidebar.collapsed .nav-item .icon { width: auto; }
  .sidebar.collapsed .sidebar-logo { display: flex; justify-content: center; padding: 14px 0; }
  .sidebar.collapsed .sidebar-footer { flex-direction: column; padding: 10px 0; align-items: center; }
  .sidebar.collapsed #sync-status { display: none; }
  .logo-mark { cursor: pointer; transition: box-shadow .15s; user-select: none; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }

  /* ── Sidebar ── */
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .logo { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; letter-spacing: -0.2px; }
  .logo-mark {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #388bff 0%, #6c63ff 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    box-shadow: 0 0 16px rgba(56,139,255,0.35);
  }
  .sidebar-logo .logo-text { color: var(--text); }
  .sidebar-logo .logo-text span { color: var(--accent); }
  .sidebar-logo .subtitle { color: var(--text3); font-size: 10.5px; margin-top: 5px; margin-left: 40px; letter-spacing: 0.02em; text-transform: uppercase; font-weight: 500; }

  .nav { padding: 8px 10px; flex: 1; }
  .nav-group { padding: 16px 8px 5px; font-size: 9.5px; text-transform: uppercase; color: var(--text3); letter-spacing: .1em; font-weight: 600; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; color: var(--text2); cursor: pointer;
    transition: color .15s, background .15s;
    font-size: 13px; border-radius: var(--r-sm); margin-bottom: 1px; font-weight: 500;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .nav-item.active {
    color: #79aaff;
    background: rgba(56,139,255,0.1);
    font-weight: 600;
  }
  .nav-item .icon { font-size: 14px; width: 18px; text-align: center; }

  .sidebar-footer {
    padding: 12px 16px; border-top: 1px solid var(--border);
    color: var(--text2); font-size: 11px;
    display: flex; align-items: center; gap: 7px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--won); flex-shrink: 0;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,200,150,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,200,150,0); }
  }

  /* ── Topbar ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; height: 54px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; color: var(--text); }
  .topbar-title small {
    font-size: 11px; font-weight: 500; margin-left: 10px;
    color: var(--text2); background: var(--surface2);
    padding: 2px 9px; border-radius: 99px; border: 1px solid var(--border);
    letter-spacing: 0;
  }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  /* ── Buttons ── */
  .btn {
    padding: 6px 14px; border-radius: var(--r-sm);
    font-size: 12px; font-weight: 600; cursor: pointer; border: none;
    transition: all .15s; font-family: inherit; letter-spacing: 0.01em;
  }
  .btn-primary {
    background: linear-gradient(135deg, #388bff, #6c63ff);
    color: #fff;
    box-shadow: 0 2px 10px rgba(56,139,255,0.3);
  }
  .btn-primary:hover { box-shadow: 0 4px 18px rgba(56,139,255,0.45); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(0,200,150,.12); color: var(--won); }
  .badge-red { background: rgba(255,83,112,.12); color: var(--lost); }
  .badge-purple { background: rgba(56,139,255,.12); color: var(--accent); }
  .badge-yellow { background: rgba(255,179,71,.12); color: var(--accent4); }

  /* ── Content ── */
  .content { padding: 24px 28px; flex: 1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Grids ── */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 16px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 16px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px;
    transition: border-color .2s;
  }
  .card:hover { border-color: rgba(255,255,255,0.11); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; }

  /* ── KPI ── */
  .kpi-value { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; letter-spacing: -0.5px; }
  .kpi-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .kpi-delta { font-size: 11px; margin-top: 6px; font-weight: 500; }
  .kpi-delta.up { color: var(--won); }
  .kpi-delta.down { color: var(--lost); }

  /* ── Funnel ── */
  .funnel-wrap { display: flex; gap: 20px; align-items: stretch; }
  .funnel-visual { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .funnel-stage { display: flex; align-items: center; gap: 12px; margin-bottom: 3px; }
  .funnel-bar-wrap { flex: 1; height: 32px; display: flex; align-items: center; position: relative; }
  .funnel-bar { height: 32px; border-radius: 6px; display: flex; align-items: center; padding: 0 12px; font-weight: 700; font-size: 12px; color: #fff; min-width: 40px; }
  .funnel-label { width: 150px; font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
  .funnel-count { width: 50px; text-align: right; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .funnel-conv { width: 46px; text-align: right; font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .dual-funnel { display: grid; grid-template-columns: 1fr 1px 1fr; }
  .funnel-divider { background: var(--border); }
  .funnel-section { padding: 0 16px; }
  .funnel-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .funnel-section-title .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Weekly Funnel ── */
  .wf-grid { display: grid; grid-template-columns: 152px repeat(4, 1fr) 42px; gap: 0; }
  .wf-gh { padding: 7px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .wf-gh.center { text-align: center; }
  .wf-gh.right { text-align: right; }
  .wf-sl { padding: 7px 8px 7px 0; font-size: 12px; color: var(--text2); display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,.04); }
  .wf-cell { padding: 5px 5px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,.04); border-left: 1px dashed rgba(255,255,255,.07); }
  .wf-mini { height: 24px; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; font-size: 11px; font-weight: 700; color: rgba(255,255,255,.95); min-width: 24px; box-sizing: border-box; overflow: hidden; transition: width .35s ease; }
  .wf-tc { padding: 7px 0 7px 4px; font-size: 12px; font-weight: 700; text-align: right; display: flex; align-items: center; justify-content: flex-end; border-bottom: 1px solid rgba(255,255,255,.04); }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 9px 14px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(56,139,255,0.04); }

  /* ── Forecast + Backlog layout ── */
  .fc-layout { display: flex; flex-direction: column; gap: 12px; }
  .fc-panel { overflow: hidden; }
  .fc-panel-header { padding: 10px 14px; font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--text2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; }
  .fc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .fc-dot-red { background: var(--lost) !important; }
  .fc-panel-count { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 1px 8px; font-size: 10px; color: var(--text3); }
  .fc-panel-hint { font-size: 10px; color: var(--text3); padding: 5px 14px; text-align: center; border-top: 1px solid rgba(255,255,255,.03); }
  .fc-drop-empty { margin: 12px; padding: 20px 16px; border: 2px dashed var(--border); border-radius: 8px; text-align: center; color: var(--text3); font-size: 11px; }
  .fc-drop-empty.fc-drag-over { border-color: var(--accent); color: var(--accent); background: rgba(56,139,255,.04); }
  tr.fc-prio-red td    { background: rgba(255,83,112,.09)  !important; }
  tr.fc-prio-red       { box-shadow: inset 3px 0 0 var(--lost); }
  tr.fc-prio-yellow td { background: rgba(255,179,71,.08)  !important; }
  tr.fc-prio-yellow    { box-shadow: inset 3px 0 0 #ffb347; }
  tr.fc-prio-green td  { background: rgba(0,200,150,.07)   !important; }
  tr.fc-prio-green     { box-shadow: inset 3px 0 0 var(--accent2); }
  tr.fc-dragging { opacity: .3; }
  tr.fc-row-drag-over td { background: rgba(56,139,255,.1) !important; outline: 2px dashed rgba(56,139,255,.4); outline-offset: -2px; }
  tr[draggable="true"] { cursor: grab; }
  .btn-prio { background: none; border: 1px solid var(--border); border-radius: 4px; width: 22px; height: 22px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .15s; padding: 0; }
  .btn-prio .prio-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text3); transition: background .15s; }
  .btn-prio.prio-green .prio-dot  { background: #00c896; }
  .btn-prio.prio-yellow .prio-dot { background: #ffb347; }
  .btn-prio.prio-red .prio-dot    { background: var(--lost); }
  .btn-bk { background: rgba(56,139,255,.1); border: 1px solid rgba(56,139,255,.2); color: var(--accent); border-radius: 4px; padding: 2px 7px; cursor: pointer; font-size: 10px; font-weight: 600; font-family: inherit; white-space: nowrap; }

  .avatar { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .rep-cell { display: flex; align-items: center; gap: 9px; }

  /* ── Progress ── */
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-track { flex: 1; height: 5px; background: var(--surface3); border-radius: 99px; overflow: hidden; min-width: 60px; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .progress-pct { font-size: 11px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }

  /* ── Goal cards ── */
  .goal-card { background: var(--surface2); border-radius: var(--r-sm); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .goal-name { font-weight: 600; font-size: 13px; }
  .goal-numbers { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
  .goal-num { text-align: center; }
  .goal-num .val { font-size: 18px; font-weight: 700; }
  .goal-num .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

  /* ── Badges: segment & stage ── */
  .segment-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; }
  .segment-enterprise { background: rgba(56,139,255,.15); color: var(--accent); }
  .segment-growth { background: rgba(0,200,150,.12); color: var(--growth); }

  .stage-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; }
  .stage-meeting { background: rgba(56,139,255,.15); color: #79aaff; }
  .stage-assessment { background: rgba(255,179,71,.12); color: var(--accent4); }
  .stage-demo { background: rgba(56,217,245,.12); color: #38d9f5; }
  .stage-proposal { background: rgba(255,140,0,.12); color: #ffaa44; }
  .stage-won { background: rgba(0,200,150,.12); color: var(--won); }
  .stage-lost { background: rgba(255,83,112,.12); color: var(--lost); }
  .stage-verbal { background: rgba(167,139,250,.12); color: var(--accent5); }
  .stage-contract { background: rgba(255,179,71,.12); color: #ffbb44; }

  /* ── Source bars ── */
  .source-list { display: flex; flex-direction: column; gap: 6px; }
  .source-item { display: flex; align-items: center; gap: 8px; }
  .source-name { font-size: 12px; width: 130px; flex-shrink: 0; }
  .source-bar-wrap { flex: 1; }
  .source-bar { height: 18px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 600; color: #fff; min-width: 28px; }
  .source-pct { font-size: 11px; font-weight: 600; width: 34px; text-align: right; color: var(--text2); flex-shrink: 0; }

  /* ── Lost reasons ── */
  .lost-reason-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .lost-reason-name { width: 180px; font-size: 12px; flex-shrink: 0; }
  .lost-count { font-size: 12px; font-weight: 600; width: 28px; flex-shrink: 0; text-align: center; }

  /* ── Inputs ── */
  .inline-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 5px 9px;
    font-size: 12px; width: 100%; outline: none; font-family: inherit;
    transition: border-color .15s, background .15s;
  }
  .inline-input:focus { border-color: var(--accent); background: rgba(56,139,255,0.05); }

  /* ── Chips ── */
  .info-chip {
    background: rgba(56,139,255,.07); border: 1px solid rgba(56,139,255,.14);
    border-radius: var(--r-sm); padding: 9px 13px; font-size: 11px;
    color: var(--text2); display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px;
  }
  .info-chip .icon { color: var(--accent); flex-shrink: 0; }
  .warn-chip {
    background: rgba(255,179,71,.06); border: 1px solid rgba(255,179,71,.14);
    border-radius: var(--r-sm); padding: 9px 13px; font-size: 11px;
    color: var(--accent4); display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px;
  }

  /* ── Tags ── */
  .new-field-tag { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; background: rgba(255,179,71,.1); border: 1px solid rgba(255,179,71,.2); color: var(--accent4); font-size: 9px; font-weight: 700; border-radius: 4px; letter-spacing: .04em; vertical-align: middle; margin-left: 4px; }
  .fallback-tag { display: inline-flex; padding: 1px 6px; background: rgba(255,83,112,.08); border: 1px solid rgba(255,83,112,.15); color: var(--lost); font-size: 9px; font-weight: 700; border-radius: 4px; margin-left: 4px; }

  /* ── Misc ── */
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .select-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r-sm); color: var(--text); padding: 5px 10px;
    font-size: 12px; cursor: pointer; outline: none; font-family: inherit;
    transition: border-color .15s;
  }
  .select-pill:focus { border-color: var(--accent); }
  .loading { color: var(--text2); padding: 60px; text-align: center; font-size: 14px; }
  .error { color: var(--lost); padding: 20px; text-align: center; font-size: 13px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ── Individual v3 ── */
  #i3tt { display:none; position:fixed; background:var(--surface2); border:1px solid rgba(255,255,255,.13); border-radius:10px; padding:10px 14px; font-size:12px; z-index:2000; min-width:190px; max-width:270px; box-shadow:0 10px 32px rgba(0,0,0,.65); pointer-events:none; }
  .i3tt-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:6px; padding-bottom:5px; border-bottom:1px solid rgba(255,255,255,.07); }
  .i3tt-row { display:flex; justify-content:space-between; gap:14px; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:11px; }
  .i3tt-row:last-child { border-bottom:none; }
  .i3tt-row.tot { border-top:1px solid rgba(255,255,255,.08); margin-top:3px; padding-top:5px; font-weight:700; border-bottom:none; }
  .i3tt-v { font-weight:700; white-space:nowrap; }

  .i3-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:14px; }
  .i3-hdr { padding:9px 15px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
  .i3-av { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; flex-shrink:0; }
  .i3-name { font-size:13px; font-weight:700; }
  .i3-email { font-size:10px; color:var(--text2); margin-top:1px; }
  .i3-stat .sv { font-size:16px; font-weight:800; line-height:1; }
  .i3-stat .sl { font-size:9px; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-top:2px; }
  .i3-q .sv { font-size:16px; font-weight:800; }
  .i3-q .sl { font-size:10px; color:var(--text2); margin-top:2px; }

<script>
// ── State ────────────────────────────────────────────────────────────────────
let DATA = null;
let segChart = null;
let ACTIVE_WEEK_IDX = 4; // índice no array DATA.weeks (4 = semana atual)
let CURRENT_BY_OWNER = [];
let ACTIVE_PERIOD_LABEL = '—'; // label do período ativo (persiste na troca de aba)
let FARMING_CACHE = null;
let FORECAST_CACHE = null;
let FC_SORT = { col: null, dir: 1 };

// ── Storage helpers (Apps Script via /api/storage proxy) ─────────────────────
const _saveDebounce = {};
function saveToStorage(tab, payload) {
  clearTimeout(_saveDebounce[tab]);
  _saveDebounce[tab] = setTimeout(() => {
    fetch('/api/storage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tab, payload }),
    }).catch(() => {});
  }, 800);
}
function saveFcPs(dealId, value) {
  if (!FORECAST_CACHE) FORECAST_CACHE = { deals: [], ps: {}, obs: {}, backlog: [], prio: {} };
  FORECAST_CACHE.ps[dealId] = parseFloat(value) || 0;
  saveToStorage('forecast', FORECAST_CACHE);
}
function saveFcObs(dealId, value) {
  if (!FORECAST_CACHE) FORECAST_CACHE = { deals: [], ps: {}, obs: {}, backlog: [], prio: {} };
  FORECAST_CACHE.obs[dealId] = value;
  saveToStorage('forecast', FORECAST_CACHE);
}
function saveFcBacklog() {
  if (!FORECAST_CACHE) FORECAST_CACHE = { deals: [], ps: {}, obs: {}, backlog: [], prio: {} };
  FORECAST_CACHE.backlog = [...document.querySelectorAll('#fc-tbody-backlog tr')].map(tr => tr.dataset.id);
  saveToStorage('forecast', FORECAST_CACHE);
}
function saveFcPrio(dealId, level) {
  if (!FORECAST_CACHE) FORECAST_CACHE = { deals: [], ps: {}, obs: {}, backlog: [], prio: {} };
  if (!FORECAST_CACHE.prio) FORECAST_CACHE.prio = {};
  if (level) FORECAST_CACHE.prio[dealId] = level;
  else delete FORECAST_CACHE.prio[dealId];
  saveToStorage('forecast', FORECAST_CACHE);
}
function cycleFcPrio(btn) {
  const row    = btn.closest('tr');
  const dealId = row.dataset.id;
  const levels = [null, 'green', 'yellow', 'red'];
  const cur    = levels.find(l => l && row.classList.contains(`fc-prio-${l}`)) || null;
  const next   = levels[(levels.indexOf(cur) + 1) % levels.length];
  levels.filter(Boolean).forEach(l => { row.classList.remove(`fc-prio-${l}`); btn.classList.remove(`prio-${l}`); });
  if (next) { row.classList.add(`fc-prio-${next}`); btn.classList.add(`prio-${next}`); }
  saveFcPrio(dealId, next);
  if (row.closest('#fc-tbody-backlog')) saveFcBacklog();
}

// ── Formatters ───────────────────────────────────────────────────────────────
function fmtBRL(val) {
  if (val == null || isNaN(val)) return '—';
  return 'R$' + Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(val) { return val == null ? '—' : val.toFixed(1) + '%'; }
function fmtNum(val) { return val == null ? '—' : Number(val).toLocaleString('pt-BR'); }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}
function initials(name) {
  return (name || '?').split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
}
const AVATAR_COLORS = ['#6c63ff','#00d4aa','#ff6b6b','#ffd166','#5bc8ff','#c084fc','#ff8c69','#44ddaa'];
function avatarColor(i) { return AVATAR_COLORS[i % AVATAR_COLORS.length]; }

function stagePillClass(stageName) {
  const s = (stageName || '').toLowerCase();
  if (s.includes('meeting')) return 'stage-meeting';
  if (s.includes('assessment')) return 'stage-assessment';
  if (s.includes('demo')) return 'stage-demo';
  if (s.includes('proposal')) return 'stage-proposal';
  if (s.includes('verbal')) return 'stage-verbal';
  if (s.includes('contract')) return 'stage-contract';
  if (s.includes('won')) return 'stage-won';
  if (s.includes('lost')) return 'stage-lost';
  return '';
}

// ── Delta badge ───────────────────────────────────────────────────────────────
function delta(curr, prev, label) {
  if (!prev && prev !== 0) return `<div class="kpi-delta" style="color:var(--text2)">${label}</div>`;
  const diff = curr - prev;
  const pct = prev > 0 ? Math.abs(diff / prev * 100).toFixed(0) : 0;
  if (diff > 0) return `<div class="kpi-delta up">↑ +${pct}% vs semana passada</div>`;
  if (diff < 0) return `<div class="kpi-delta down">↓ -${pct}% vs semana passada</div>`;
  return `<div class="kpi-delta" style="color:var(--text2)">= igual à semana passada</div>`;
}

// ── Individual v3: goal helpers (per-month) ───────────────────────────────────
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
function getG2(ownerId, mk) {
  return parseFloat(localStorage.getItem('moveo_g2_' + ownerId + '_' + mk) || '0');
}
function setG2(ownerId, mk, val) {
  localStorage.setItem('moveo_g2_' + ownerId + '_' + mk, val);
  // keep old key in sync (used by buildGoals)
  if (DATA) {
    const cur = (DATA.months || []).find(m => m.isCurrent);
    if (cur && cur.key === mk) localStorage.setItem('moveo_goals_individual_' + ownerId, val);
  }
  refreshI3Card(ownerId);
  renderGoalProgress();
}
function refreshI3Card(ownerId) {
  if (!DATA) return;
  const months = DATA.months || [];
  months.forEach(m => {
    const goal = getG2(ownerId, m.key);
    const ob = (m.by_owner || []).find(o => o.owner_id === ownerId) || {};
    const wonMrr = ob.won_mrr_this_period || 0;
    const pct = goal > 0 ? Math.min(Math.round(wonMrr / goal * 100), 100) : 0;
    const pctColor = pct >= 100 ? 'var(--won)' : pct >= 70 ? 'var(--accent4)' : 'var(--lost)';
    const barEl = document.getElementById('i3-mbar-' + ownerId + '-' + m.key);
    if (barEl) { barEl.style.width = pct + '%'; barEl.style.background = pctColor; }
    const bdgEl = document.getElementById('i3-mbdg-' + ownerId + '-' + m.key);
    if (bdgEl) {
      bdgEl.textContent = goal > 0 ? pct + '%' : '—';
      bdgEl.style.background = pct >= 100 ? 'rgba(0,200,150,.15)' : pct >= 70 ? 'rgba(255,179,71,.13)' : 'rgba(255,83,112,.12)';
      bdgEl.style.color = pctColor;
    }
  });
  const pastMths = months.filter(m => !m.isCurrent);
  const qGoal = pastMths.reduce((s, m) => s + getG2(ownerId, m.key), 0);
  const qWon  = pastMths.reduce((s, m) => {
    const ob = (m.by_owner || []).find(o => o.owner_id === ownerId) || {};
    return s + (ob.won_mrr_this_period || 0);
  }, 0);
  const qPct = qGoal > 0 ? Math.min(Math.round(qWon / qGoal * 100), 100) : 0;
  const qPctColor = qPct >= 100 ? 'var(--won)' : qPct >= 70 ? 'var(--accent4)' : 'var(--lost)';
  const qBarEl = document.getElementById('i3-qbar-' + ownerId);
  const qValEl = document.getElementById('i3-qval-' + ownerId);
  const qSubEl = document.getElementById('i3-qsub-' + ownerId);
  if (qBarEl) { qBarEl.style.width = qPct + '%'; qBarEl.style.background = qPctColor; }
  if (qValEl) qValEl.textContent = fmtBRL(qWon);
  if (qSubEl) qSubEl.textContent = 'Meta Q: ' + fmtBRL(qGoal) + ' · ' + qPct + '%';
}
function refreshAllI3Cards() {
  document.querySelectorAll('.i3-card').forEach(el => refreshI3Card(el.id.replace('i3-card-','')));
}

// ── Weekly Funnel ─────────────────────────────────────────────────────────────
const WF_COLORS = ['#6c63ff', '#38d9f5', '#ffb347', '#f472b6', '#00d4aa', '#ff8c69', '#a78bfa', '#ffd166'];
const WF_STAGES = [
  { label: 'Meeting Scheduled', field: 'new_deals' },
  { label: 'Assessment',        field: 'assessments' },
  { label: 'Product Demo',      field: 'demos' },
  { label: 'Commercial Prop.',  field: 'proposals' },
  { label: 'Verbal Agreement',  field: 'verbals' },
  { label: 'Contract Sent',     field: 'contracts' },
  { label: 'Won',               field: 'won' },
  { label: 'Lost',              field: 'lost' },
];

function renderWeeklyFunnelHtml(weeks) {
  if (!weeks || !weeks.length) return '';
  const colors = weeks.map((_, i) => WF_COLORS[i % WF_COLORS.length]);
  const counts = WF_STAGES.map(s => weeks.map(w => ((w.metrics || {})[s.field] || 0)));
  const globalMax   = Math.max(...counts.flat(), 1);
  const stageTotals = counts.map(row => row.reduce((a, b) => a + b, 0));
  const colStyle    = `grid-template-columns: 130px repeat(${weeks.length}, 1fr) 60px`;

  const wkHeaders = weeks.map((w, i) => {
    const short = (w.short_label || `W${i+1}`).replace(/\s+\d{4}$/, '').trim();
    return `<div class="wf-gh center" style="color:${colors[i]}">W${i+1}<br>
      <span style="font-weight:400;font-size:9px;opacity:.75;text-transform:none;letter-spacing:0">${short}</span></div>`;
  }).join('');

  const rows = WF_STAGES.map((s, si) => {
    const isWon  = s.field === 'won';
    const isLost = s.field === 'lost';
    const lblStyle = isWon  ? 'color:var(--won);font-weight:600'
                   : isLost ? 'color:var(--lost);font-weight:600' : '';
    const cells = counts[si].map((cnt, wi) => {
      const pct = cnt > 0 ? Math.max(cnt / globalMax * 100, 14) : 0;
      const bar = cnt > 0
        ? `<div class="wf-mini" style="width:${pct}%;background:${colors[wi]}">${cnt}</div>`
        : `<div style="font-size:11px;color:var(--text3);padding-left:2px">—</div>`;
      return `<div class="wf-cell">${bar}</div>`;
    }).join('');
    return `
      <div class="wf-sl" style="${lblStyle}">${s.label}</div>
      ${cells}
      <div class="wf-tc" style="${lblStyle}">${stageTotals[si] || '—'}</div>`;
  }).join('');

  const rangeLabel = (weeks[0]?.short_label || '').replace(/\s+\d{4}$/, '').trim();
  return `
    <div class="card-header">
      <div class="card-title">Funil Semanal — Atividade por Estágio</div>
      <div style="font-size:11px;color:var(--text2)">${rangeLabel} → hoje · barras relativas ao máximo global</div>
    </div>
    <div class="wf-grid" style="${colStyle}">
      <div class="wf-gh">Estágio</div>
      ${wkHeaders}
      <div class="wf-gh right">Total</div>
      ${rows}
    </div>`;
}

function buildWeeklyFunnel(d) {
  const weeks = (d.weeks || []).slice(-4);
  if (!weeks.length) return '';
  return `<div class="card" id="weekly-funnel-card" style="margin-bottom:20px">${renderWeeklyFunnelHtml(weeks)}</div>`;
}

function updateWeeklyFunnel(weeks) {
  const el = document.getElementById('weekly-funnel-card');
  if (!el || !weeks || !weeks.length) return;
  el.innerHTML = renderWeeklyFunnelHtml(weeks);
}

function buildIndividual(d) {
  const owners = d.by_owner || [];
  if (!owners.length) {
    return `<div id="tab-individual" class="tab-content"><div class="info-chip"><span class="icon">ℹ️</span>Nenhum responsável encontrado nos deals.</div></div>`;
  }

  const FEATURED_SELLERS = ["henrique", "arnaldo", "benedetti", "bomfim", "bomfin", "bonfim"];
  const filteredOwners = owners.filter(o =>
    FEATURED_SELLERS.some(name => (o.owner_name || '').toLowerCase().includes(name))
  );
  if (!filteredOwners.length) {
    return `<div id="tab-individual" class="tab-content"><div class="info-chip">Nenhum seller encontrado.</div></div>`;
  }

  const allWeeks = d.weeks || [];
  const weeks4   = allWeeks.slice(-4);
  const curWeek  = allWeeks[allWeeks.length - 1] || {};
  const wColors  = ['var(--accent5)', 'var(--accent)', 'var(--accent4)', 'var(--accent2)'];
  const wLbls    = ['W1', 'W2', 'W3', 'W4'];

  const months   = d.months || [];
  const pastMths = months.slice(0, 3);
  const curMth   = months.find(m => m.isCurrent) || months[months.length - 1] || {};

  const CP_STAGE = '459596270';

  const fmtWkRange = wk => {
    if (!wk || !wk.start) return '';
    const s = new Date(wk.start), e = new Date(wk.end);
    const fmt = dt => dt.toLocaleDateString('pt-BR', { day:'numeric', month:'short', timeZone:'UTC' }).replace('.','');
    return fmt(s) + '–' + fmt(e);
  };

  const STAGE_STYLES = {
    '459596268': ['rgba(167,139,250,.15)', '#c084fc', 'Meeting Sched.'],
    '459596269': ['rgba(255,179,71,.14)',  '#ffb347', 'Assessment'],
    '471108325': ['rgba(91,200,255,.14)',  '#5bc8ff', 'Product Demo'],
    '459596270': ['rgba(255,140,0,.14)',   '#ffaa44', 'Comm. Proposal'],
    '459596271': ['rgba(167,139,250,.18)', '#a78bfa', 'Verbal Agr.'],
  };
  const stageBadge = sid => {
    const [bg, col, nm] = STAGE_STYLES[sid] || ['rgba(255,255,255,.06)', 'var(--text3)', sid || '?'];
    return `<span style="display:inline-flex;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;background:${bg};color:${col}">${nm}</span>`;
  };

  // Tooltip helpers — produce HTML safe for embedding inside a single-quoted JS string
  // inside a double-quoted HTML attribute. No actual " chars; use &quot; for multi-word class.
  const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const tT   = t => `<div class=i3tt-title>${esc(t)}</div>`;
  const tR   = (l,v,c='') => `<div class=i3tt-row><span>${esc(l)}</span><span class=i3tt-v${c?` style=color:${c}`:''}>${v}</span></div>`;
  const tTot = (l,v,c='') => `<div class=&quot;i3tt-row tot&quot;><span>${esc(l)}</span><span class=i3tt-v${c?` style=color:${c}`:''}>${v}</span></div>`;
  const tip  = html => `onmouseenter="i3Tip(event,'${html}')" onmouseleave="i3HideTip()"`;

  const WEEK_STAGES = [
    { key:'new_this_period',         lbl:'Meeting Sched.',  trClass:'' },
    { key:'assessments_this_period', lbl:'Assessment',      trClass:'' },
    { key:'demos_this_period',       lbl:'Product Demo',    trClass:'' },
    { key:'proposals_this_period',   lbl:'Comm. Proposal',  trClass:'' },
    { key:'verbals_this_period',     lbl:'Verbal Agr.',     trClass:'' },
    { key:'won_this_period',         lbl:'Won ↗',           trClass:'won-r', isWon:true },
    { key:'lost_this_period',        lbl:'Lost',            trClass:'lost-r' },
  ];

  const cards = filteredOwners.map((o, idx) => {
    const oid       = o.owner_id;
    const allActive = (d.active_deals || []).filter(dl => dl.owner_id === oid);

    const stalledDeals = [...allActive]
      .filter(dl => dl.days_stalled != null)
      .sort((a,b) => (b.days_stalled||0) - (a.days_stalled||0))
      .slice(0, 5);

    const allProposals = allActive.filter(dl => dl.stage_id === CP_STAGE);
    const propTotal    = allProposals.reduce((s,dl) => s + (dl.amount||0), 0);
    const proposals    = [...allProposals].sort((a,b) => (b.amount||0) - (a.amount||0)).slice(0, 5);

    let cpTtHtml = tT(`Em Proposta · ${o.owner_name.split(' ')[0]}`);
    [...allProposals].sort((a,b) => (b.amount||0) - (a.amount||0)).forEach(dl => {
      cpTtHtml += tR(dl.name||'—', fmtBRL(dl.amount), 'var(--accent4)');
    });
    if (allProposals.length > 0) cpTtHtml += tTot('Total', fmtBRL(propTotal), 'var(--accent4)');
    const cpTip = allProposals.length ? ` ${tip(cpTtHtml)}` : '';

    const curWkOb = (curWeek.by_owner || []).find(ob => ob.owner_id === oid) || {};

    // Q bar (past 3 months only — not counting current in-progress month)
    const qGoal = pastMths.reduce((s,m) => s + getG2(oid, m.key), 0);
    const qWon  = pastMths.reduce((s,m) => {
      const ob = (m.by_owner||[]).find(ob => ob.owner_id === oid) || {};
      return s + (ob.won_mrr_this_period||0);
    }, 0);
    const qPct   = qGoal > 0 ? Math.min(Math.round(qWon / qGoal * 100), 100) : 0;
    const qColor = qPct >= 100 ? 'var(--won)' : qPct >= 70 ? 'var(--accent4)' : 'var(--lost)';

    // Efficiency
    const won4w      = weeks4.reduce((s,wk) => { const ob=(wk.by_owner||[]).find(ob=>ob.owner_id===oid)||{}; return s+(ob.won_this_period||0); }, 0);
    const meetings4w = weeks4.reduce((s,wk) => { const ob=(wk.by_owner||[]).find(ob=>ob.owner_id===oid)||{}; return s+(ob.new_this_period||0); }, 0);
    const convM2W    = meetings4w > 0 ? Math.round(won4w / meetings4w * 100) : 0;
    const stalled90  = allActive.filter(dl => (dl.days_stalled||0) >= 90).length;
    const winRateAll = (o.won_total + o.lost_total) > 0 ? Math.round(o.won_total / (o.won_total + o.lost_total) * 100) : 0;
    const periodWon  = o.won_this_period  || 0;
    const periodLost = o.lost_this_period || 0;
    const wlTotal    = periodWon + periodLost;

    // ── Monthly columns ──────────────────────────────────────────────────────
    const pastMthsHtml = pastMths.map(m => {
      const ob   = (m.by_owner||[]).find(ob => ob.owner_id === oid) || {};
      const goal = getG2(oid, m.key);
      const wonM = ob.won_mrr_this_period || 0;
      const pct  = goal > 0 ? Math.min(Math.round(wonM / goal * 100), 100) : null;
      const col  = pct == null ? 'var(--text3)' : pct >= 100 ? 'var(--won)' : pct >= 70 ? 'var(--accent4)' : 'var(--lost)';
      const bdgBg = pct == null ? 'rgba(255,255,255,.05)' : pct >= 100 ? 'rgba(0,200,150,.12)' : pct >= 70 ? 'rgba(255,179,71,.13)' : 'rgba(255,83,112,.1)';
      return `<div class="i3-m">
        <div class="i3-mhdr">
          <span class="i3-mname">${capitalize(m.label)}</span>
          <span class="i3-pct-bdg" id="i3-mbdg-${oid}-${m.key}" style="background:${bdgBg};color:${col}">${pct != null ? pct + '%' : '—'}</span>
        </div>
        <div class="i3-mrr" style="color:${col}">${fmtBRL(wonM)}</div>
        <div style="font-size:9px;color:var(--text2);margin:1px 0 3px">Meta <input type="number" placeholder="0" style="background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-size:9px;width:65px;outline:none;padding:0 2px"
          value="${goal || ''}" oninput="setG2('${oid}','${m.key}',this.value)"></div>
        <div class="i3-mbar"><div class="i3-mbar-fill" id="i3-mbar-${oid}-${m.key}" style="width:${pct != null ? pct : 0}%;background:${col}"></div></div>
        <div class="i3-mdeals">${ob.won_this_period||0} ganhos · ${ob.lost_this_period||0} perdidos</div>
      </div>`;
    }).join('');

    const curOb     = (curMth.by_owner||[]).find(ob => ob.owner_id === oid) || {};
    const curGoal   = getG2(oid, curMth.key || '');
    const curWonMrr = curOb.won_mrr_this_period || 0;
    const curPct    = curGoal > 0 ? Math.round(curWonMrr / curGoal * 100) : null;

    const curMthHtml = `<div class="i3-m-cur">
      <div class="i3-mname" style="margin-bottom:5px;color:rgba(56,139,255,.75)">${capitalize(curMth.label||'')} — Em andamento</div>
      <div class="i3-mci"><span class="mlbl">MRR fechado</span><span class="mval" style="color:var(--accent4)">${fmtBRL(curWonMrr)}${curPct!=null?` <small style="color:var(--text2);font-weight:400">${curPct}%</small>`:''}</span></div>
      <div class="i3-mci"><span class="mlbl">Meta</span><span class="mval"><input type="number" placeholder="Definir" style="background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--text);font-size:10px;width:78px;outline:none;padding:0 2px"
        value="${curGoal||''}" oninput="setG2('${oid}','${curMth.key}',this.value)" id="i3-cur-goal-${oid}"></span></div>
      <div class="i3-mci"><span class="mlbl">Won / Lost</span><span class="mval"><span style="color:var(--won)">${curOb.won_this_period||0}</span> / <span style="color:var(--lost)">${curOb.lost_this_period||0}</span></span></div>
      <div class="i3-mci"><span class="mlbl">Deals ativos</span><span class="mval">${o.active_deals||0}</span></div>
    </div>`;

    // ── Monthly funnel table (last 4 months) ────────────────────────────────
    const mColors  = ['var(--accent5)', 'var(--accent)', 'var(--accent4)', 'var(--accent2)'];
    const mAbbr    = m => capitalize(m.label || '').substring(0, 3).toUpperCase();

    const mnlThCells = months.map((m, mi) => {
      const ob    = (m.by_owner||[]).find(ob => ob.owner_id === oid) || {};
      const total = WEEK_STAGES.reduce((s,st) => s + (ob[st.key]||0), 0);
      const ttRows = WEEK_STAGES.map(st => {
        const v = ob[st.key] || 0;
        if (!v) return '';
        const c = st.isWon ? '#00c896' : st.trClass === 'lost-r' ? '#ff5370' : '';
        return tR(st.lbl, v, c);
      }).filter(Boolean).join('');
      const ttHtml = tT(`${capitalize(m.label)} · ${o.owner_name.split(' ')[0]}`) + ttRows + tTot('Total', total);
      return `<th style="color:${mColors[mi]};cursor:pointer${m.isCurrent?';font-style:italic':''}" ${tip(ttHtml)}>${mAbbr(m)}<span class="wwd">${m.isCurrent ? 'atual' : ''}</span></th>`;
    }).join('');

    const globalFunnelMax = Math.max(...WEEK_STAGES.flatMap(st =>
      months.map(m => { const ob=(m.by_owner||[]).find(ob=>ob.owner_id===oid)||{}; return ob[st.key]||0; })
    ), 1);

    const mnlRows = WEEK_STAGES.map(st => {
      const rowVals  = months.map(m => { const ob=(m.by_owner||[]).find(ob=>ob.owner_id===oid)||{}; return ob[st.key]||0; });
      const rowTotal = rowVals.reduce((s,v) => s+v, 0);
      const trCls    = st.trClass ? ` class="${st.trClass}"` : '';

      const cells = rowVals.map((val, mi) => {
        if (!val) return `<td><div class="i3-wc"><span class="i3-wdash">—</span></div></td>`;
        const bw  = Math.max(Math.round(val / globalFunnelMax * 100), 14);
        const m   = months[mi];
        const ob  = (m.by_owner||[]).find(ob=>ob.owner_id===oid)||{};
        let ttHtml = tT(`${st.lbl} · ${capitalize(m.label)}`);
        if (st.isWon) {
          ttHtml += tR('Deals ganhos', val, '#00c896');
          if (ob.won_mrr_this_period > 0) ttHtml += tTot('MRR gerado', fmtBRL(ob.won_mrr_this_period), '#00c896');
        } else {
          ttHtml += tR('Deals', val);
        }
        return `<td><div class="i3-wc"><div class="i3-wb" style="width:${bw}%;background:${mColors[mi]}" ${tip(ttHtml)}>${val}</div></div></td>`;
      }).join('');

      let snExtra = '';
      if (st.isWon && rowTotal > 0) {
        const totalMrr = months.reduce((s,m) => { const ob=(m.by_owner||[]).find(ob=>ob.owner_id===oid)||{}; return s+(ob.won_mrr_this_period||0); }, 0);
        let tt = tT(`Won — 4 meses · ${o.owner_name.split(' ')[0]}`);
        months.forEach(m => {
          const ob = (m.by_owner||[]).find(ob=>ob.owner_id===oid)||{};
          const v  = ob.won_this_period || 0;
          if (v > 0) tt += tR(capitalize(m.label), `${v} deal${v>1?'s':''} · ${fmtBRL(ob.won_mrr_this_period||0)}`, '#00c896');
        });
        tt += tTot('MRR total', fmtBRL(totalMrr), '#00c896');
        snExtra = ' ' + tip(tt);
      }

      return `<tr${trCls}>
        <td class="wsn"${snExtra}>${st.lbl}</td>
        ${cells}
        <td class="wtc">${rowTotal || '—'}</td>
      </tr>`;
    }).join('');

    // ── Cohort funnel rows ───────────────────────────────────────────────────
    const nowMs2 = Date.now();
    const COH_STAGES = [
      { key: 'cohort_size',        lbl: 'Meeting Sched.', trClass: '' },
      { key: 'reached_assessment', lbl: 'Assessment',     trClass: '' },
      { key: 'reached_demo',       lbl: 'Product Demo',   trClass: '' },
      { key: 'reached_proposal',   lbl: 'Comm. Proposal', trClass: '' },
      { key: 'reached_verbal',     lbl: 'Verbal Agr.',    trClass: '' },
      { key: 'won',                lbl: 'Won ↗',          trClass: 'won-r', isWon: true },
      { key: 'lost',               lbl: 'Lost',           trClass: 'lost-r' },
    ];
    const cohortRows = COH_STAGES.map(st => {
      const cells = months.map((m, mi) => {
        const cob      = (m.cohort_by_owner||[]).find(c => c.owner_id === oid) || {};
        const cohSize  = cob.cohort_size || 0;
        const val      = cob[st.key] || 0;
        const pct      = cohSize > 0 ? Math.round(val / cohSize * 100) : 0;
        const bw       = st.key === 'cohort_size' ? 100 : pct;
        const mEnd     = new Date(m.end);
        const ageDays  = Math.floor((nowMs2 - mEnd.getTime()) / 86400000);
        const immature = ageDays < 60 && !m.isCurrent;
        const isCur    = m.isCurrent;
        if (!cohSize) return `<td><div class="i3-wc"><span class="i3-wdash">—</span></div></td>`;
        const barColor = mColors[mi];
        const dispBw   = Math.max(bw, bw > 0 ? 14 : 0);
        const label    = st.key === 'cohort_size' ? `${val}` : `${val} <span class="i3-coh-pct">${pct}%</span>`;
        const immTag   = immature ? `<span class="i3-immature">~</span>` : '';
        return `<td><div class="i3-wc">${val > 0
          ? `<div class="i3-wb" style="width:${dispBw}%;background:${barColor};opacity:${immature?.7:1}">${val}</div><span class="i3-coh-pct">${pct}%${immTag}</span>`
          : `<span class="i3-wdash">—</span>`
        }</div></td>`;
      }).join('');
      const trCls = st.trClass ? ` class="${st.trClass}"` : '';
      return `<tr${trCls}><td class="wsn">${st.lbl}</td>${cells}<td class="wtc"></td></tr>`;
    }).join('');

    // ── Stalled deals table ──────────────────────────────────────────────────
    const stalledHtml = stalledDeals.length ? `
      <table class="i3-tbl">
        <thead><tr><th>Deal</th><th>Estágio</th><th>MRR</th><th>Close</th><th>Parado há</th></tr></thead>
        <tbody>${stalledDeals.map(dl => {
          const days = dl.days_stalled;
          const dCol = days >= 45 ? 'var(--accent4)' : 'var(--text2)';
          const closePast = dl.closedate && new Date(dl.closedate) < new Date();
          return `<tr>
            <td>${esc(dl.name||'—')}</td>
            <td>${stageBadge(dl.stage_id)}</td>
            <td style="font-weight:600">${fmtBRL(dl.amount)}${dl.amount_fallback?`<span class="i3-est">est.</span>`:''}</td>
            <td style="color:${closePast?'var(--lost)':'var(--text2)'}">${fmtDate(dl.closedate)}</td>
            <td style="color:${dCol};font-weight:600">${days}d${days>=45?` <span class="i3-stale">parado</span>`:''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : `<div style="font-size:11px;color:var(--text3);padding:4px 0">Nenhum deal ativo</div>`;

    // ── Proposals table ──────────────────────────────────────────────────────
    const propHtml = proposals.length ? `
      <table class="i3-tbl">
        <thead><tr><th>Deal</th><th>MRR</th><th>Close</th><th>Tempo em CP</th></tr></thead>
        <tbody>${proposals.map(dl => {
          const days = dl.days_stalled;
          const closePast = dl.closedate && new Date(dl.closedate) < new Date();
          return `<tr>
            <td>${esc(dl.name||'—')}</td>
            <td style="font-weight:600;color:var(--accent4)">${fmtBRL(dl.amount)}${dl.amount_fallback?`<span class="i3-est">est.</span>`:''}</td>
            <td style="color:${closePast?'var(--lost)':'var(--text2)'}">${fmtDate(dl.closedate)}</td>
            <td style="color:${days>=30?'var(--accent4)':'var(--text2)'}">${days!=null?days+'d':'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : `<div style="font-size:11px;color:var(--text3);padding:4px 0">Nenhuma proposta ativa</div>`;

    // ── Card HTML ────────────────────────────────────────────────────────────
    return `
    <div class="i3-card" id="i3-card-${oid}">

      <!-- 1. Header -->
      <div class="i3-hdr">
        <div style="display:flex;align-items:center;gap:9px">
          <div class="i3-av" style="background:${avatarColor(idx)}">${initials(o.owner_name)}</div>
          <div>
            <div class="i3-name">${o.owner_name}</div>
            <div class="i3-email">${o.owner_email||''}</div>
          </div>
        </div>
        <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
          <div class="i3-stat">
            <div class="sv" style="color:var(--accent4)">${winRateAll}%</div>
            <div class="sl">Win Rate</div>
          </div>
          <div class="i3-stat">
            <div class="sv" style="color:var(--accent)">${o.avg_cycle != null ? Math.round(o.avg_cycle) + 'd' : '—'}</div>
            <div class="sl">Ciclo Médio</div>
          </div>
          <div class="i3-q" style="min-width:175px">
            <div class="sv" style="color:${qColor}" id="i3-qval-${oid}">${fmtBRL(qWon)}</div>
            <div class="sl" id="i3-qsub-${oid}">Meta Q: ${fmtBRL(qGoal)} · ${qPct}%</div>
            <div class="qbar"><div class="qfill" id="i3-qbar-${oid}" style="width:${qPct}%;background:${qColor}"></div></div>
          </div>
        </div>
      </div>

      <!-- 2. Monthly breakdown (3 past + current) -->
      <div class="i3-months">
        ${pastMthsHtml}
        ${curMthHtml}
      </div>

      <!-- 3. Period stats -->
      <div class="i3-period">
        <div class="i3-plbl">No Período</div>
        <div class="i3-row1">
          <div class="i3-pi"><div class="i3-pv" id="i3-per-new-${oid}" style="color:var(--won)">${o.new_this_period||0}</div><div class="i3-pl">Novos</div></div>
          <div class="i3-pi"><div class="i3-pv" id="i3-per-ass-${oid}" style="color:var(--accent4)">${o.assessments_this_period||0}</div><div class="i3-pl">Assess.</div></div>
          <div class="i3-pi"><div class="i3-pv" id="i3-per-dem-${oid}" style="color:var(--accent)">${o.demos_this_period||0}</div><div class="i3-pl">Demos</div></div>
          <div class="i3-pi"><div class="i3-pv" id="i3-per-prop-${oid}" style="color:#ffaa44">${o.proposals_this_period||0}</div><div class="i3-pl">Prop.</div></div>
          <div class="i3-pi"><div class="i3-pv" id="i3-per-won-${oid}" style="color:var(--won)">${o.won_this_period||0}</div><div class="i3-pl">Ganhos</div></div>
          <div class="i3-pi"><div class="i3-pv" id="i3-per-lost-${oid}" style="color:var(--lost)">${o.lost_this_period||0}</div><div class="i3-pl">Perdidos</div></div>
        </div>
        <div class="i3-row2">
          <div class="i3-pi2"><div class="i3-pv2" style="color:var(--accent)">${o.active_deals||0}</div><div class="i3-pl2">Ativos</div></div>
          <div class="i3-pi2"><div class="i3-pv2" style="color:var(--won)">${o.won_total||0}</div><div class="i3-pl2">Won (all)</div>${o.won_mrr > 0 ? `<div style="font-size:9px;color:var(--won);opacity:.7;margin-top:1px">${fmtBRL(o.won_mrr)}</div>` : ''}</div>
          <div class="i3-pi2"><div class="i3-pv2" style="color:var(--lost)">${o.lost_total||0}</div><div class="i3-pl2">Lost (all)</div></div>
          <div class="i3-pi2"><div class="i3-pv2" style="color:var(--accent4);font-size:12px">${fmtBRL(o.pipeline_value)}</div><div class="i3-pl2">Pipeline</div></div>
          <div class="i3-pi2" style="cursor:${allProposals.length?'pointer':'default'}"${cpTip}><div class="i3-pv2" style="color:var(--accent4);font-size:12px">${allProposals.length ? fmtBRL(propTotal) : '—'}</div><div class="i3-pl2">Em Proposta</div></div>
        </div>
      </div>

      <!-- 4. Monthly funnel table -->
      <div class="i3-weekly">
        <div class="i3-wkhdr">
          <div class="i3-wkt">Funil Mensal</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="i3-wkn" id="i3-fmode-lbl-${oid}">Atividade · entradas por estágio</div>
            <div class="i3-funnel-toggle">
              <button class="i3-ftbtn active" id="i3-ftact-${oid}" onclick="setI3FunnelMode('activity','${oid}')">Atividade</button>
              <button class="i3-ftbtn" id="i3-ftcoh-${oid}" onclick="setI3FunnelMode('cohort','${oid}')">Coorte</button>
            </div>
          </div>
        </div>
        <table class="i3-wt" id="i3-ftbl-${oid}">
          <thead><tr>
            <th class="wsc">Estágio</th>
            ${mnlThCells}
            <th class="wtc i3-wtc-act">Total</th>
          </tr></thead>
          <tbody class="i3-act-rows">${mnlRows}</tbody>
          <tbody class="i3-coh-rows">${cohortRows}</tbody>
        </table>
      </div>

      <!-- 5. Efficiency -->
      <div class="i3-eff">
        <div class="i3-ei">
          <div class="i3-el">Win Rate</div>
          <div class="i3-ev" style="color:var(--accent4)">${winRateAll}%</div>
          <div class="i3-esub">histórico</div>
        </div>
        <div class="i3-ei">
          <div class="i3-el">Ciclo Médio</div>
          <div class="i3-ev" style="color:var(--accent)">${o.avg_cycle != null ? Math.round(o.avg_cycle) + 'd' : '—'}</div>
          <div class="i3-esub">Meeting → Won</div>
        </div>
        <div class="i3-ei">
          <div class="i3-el">Conv. Meeting→Won</div>
          <div class="i3-ev" style="color:var(--accent5)">${convM2W}%</div>
          <div class="i3-esub">${won4w} won / ${meetings4w} meetings</div>
        </div>
        <div class="i3-ei">
          <div class="i3-el">Parados >90d</div>
          <div class="i3-ev" style="color:${stalled90 > 0 ? 'var(--accent4)' : 'var(--text2)'}">${stalled90}</div>
          ${stalled90 > 0 ? '<div class="i3-ewarn">⚠ Atenção</div>' : '<div class="i3-esub">OK</div>'}
        </div>
        <div class="i3-ei">
          <div class="i3-el">Won vs Lost</div>
          <div style="display:flex;align-items:baseline;gap:4px;margin:4px 0 2px">
            <span style="font-size:17px;font-weight:800;color:var(--won)">${periodWon}</span>
            <span style="font-size:9px;color:var(--text2)">won</span>
            <span style="font-size:17px;font-weight:800;color:var(--lost)">${periodLost}</span>
            <span style="font-size:9px;color:var(--text2)">lost</span>
          </div>
          <div class="i3-wlbar">
            <div class="i3-wlw" style="width:${wlTotal>0?Math.round(periodWon/wlTotal*100):0}%"></div>
            <div class="i3-wll" style="width:${wlTotal>0?Math.round(periodLost/wlTotal*100):0}%"></div>
          </div>
        </div>
      </div>

      <!-- 6. Pipeline tables -->
      <div class="i3-pipe">
        <div>
          <div class="i3-ph">
            <div class="i3-pt">⏱ Deals Parados há Mais Tempo</div>
            <div style="font-size:10px;color:var(--accent4)">${stalledDeals.length} deal${stalledDeals.length !== 1 ? 's' : ''}</div>
          </div>
          ${stalledHtml}
        </div>
      </div>

    </div>`;
  }).join('');

  return `
  <div id="tab-individual" class="tab-content">
    <div style="display:grid;grid-template-columns:1fr;gap:12px;padding:4px 0">
      ${cards}
    </div>
  </div>`;
}

// Backward-compat wrappers (used by buildGoals / old callers)

// ── Goals ─────────────────────────────────────────────────────────────────────
function buildGoals(d) {
  const allOwners = d.by_owner || [];
  const FEATURED = ["henrique", "arnaldo", "benedetti", "bomfim", "bomfin", "bonfim"];
  const owners = allOwners.filter(o =>
    FEATURED.some(name => (o.owner_name || '').toLowerCase().includes(name))
  );
  const activeDeals = d.active_deals || [];
  const summary = d.summary || {};

  // Calcula métricas do time (apenas sellers featured, período selecionado)
  const totalWonMrr = owners.reduce((a, o) => a + (o.won_mrr_this_period || 0), 0);
  const totalWonDeals = owners.reduce((a, o) => a + (o.won_this_period || 0), 0);
  const totalActiveDeals = activeDeals.length;
  // Ticket médio usa dados históricos (all-time) para simulação mais precisa
  const allTimeMrr   = owners.reduce((a, o) => a + (o.won_mrr   || 0), 0);
  const allTimeDeals = owners.reduce((a, o) => a + (o.won_total || 0), 0);
  const avgTicket = allTimeDeals > 0 ? allTimeMrr / allTimeDeals : 0;
  const winRate = summary.overall_win_rate || 0;

  // Lê metas — usa a mesma chave da aba Individual
  const getGoalMrr = (oid) => parseFloat(localStorage.getItem('moveo_goals_individual_' + oid) || '0');

  const totalGoal = owners.reduce((a, o) => a + getGoalMrr(o.owner_id), 0);
  const teamGoalPct = totalGoal > 0 ? Math.min(Math.round(totalWonMrr / totalGoal * 100), 100) : 0;
  const contractsNeeded = avgTicket > 0 ? Math.ceil(totalGoal / avgTicket) : 0;

  // Forecast selecionado
  const forecastMrr = getForecastTotalMrr();

  // Farming vs Hunting
  const farming = splitFarmingByDate();
  const farmingMrr = farming.realizedMrr; // só conta o farming com data já passada
  const huntingMrr = totalWonMrr;

  // Realizado total = Hunting + Farming realizado
  const totalRealized = totalWonMrr + farmingMrr;
  const teamGoalPctInit = totalGoal > 0 ? Math.min(Math.round(totalRealized / totalGoal * 100), 100) : 0;

  // Cards do topo
  const topCards = `
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card" style="text-align:center">
        <div class="kpi-label">Meta do Time (Mês)</div>
        <div class="kpi-value" style="color:var(--accent);font-size:22px" id="goal-total-display">${fmtBRL(totalGoal)}</div>
        <div style="margin-top:10px">
          <div class="progress-wrap" style="justify-content:center">
            <div class="progress-track" style="flex:1;max-width:200px"><div class="progress-fill" id="goal-team-bar" style="width:${teamGoalPctInit}%;background:var(--won)"></div></div>
            <div class="progress-pct" style="color:var(--won)" id="goal-team-pct">${teamGoalPctInit}%</div>
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px" id="goal-team-realized-wrap">
            Realizado: <strong id="goal-team-realized" style="color:var(--text)">${fmtBRL(totalRealized)}</strong>
            <span style="opacity:0.7"> · <span style="color:var(--accent2)" id="goal-hunting-inline">${fmtBRL(totalWonMrr)}</span> hunting + <span style="color:var(--accent4)" id="goal-farming-inline">${fmtBRL(farmingMrr)}</span> farming</span>
          </div>
        </div>
      </div>
      <div class="card" style="text-align:center">
        <div class="kpi-label">Contratos necessários p/ meta</div>
        <div class="kpi-value" style="color:var(--accent4)" id="goal-contracts-needed">${contractsNeeded || '—'}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-sim-subtitle">Ticket médio histórico: ${fmtBRL(avgTicket)}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:3px;opacity:0.6">Simulação: meta ÷ ticket médio histórico</div>
      </div>
    </div>
    <div class="grid-3" style="margin-bottom:20px">
      <div class="card" style="text-align:center">
        <div class="kpi-label">Forecast Geral</div>
        <div class="kpi-value" style="color:var(--won);font-size:22px" id="goal-forecast-mrr">${fmtBRL(forecastMrr + farming.pendingMrr)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-forecast-count">Vendas + Farming pendente</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="kpi-label">Forecast de Vendas</div>
        <div class="kpi-value" style="color:var(--accent2);font-size:22px" id="goal-forecast-sales-mrr">${fmtBRL(forecastMrr)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-forecast-sales-count">${getForecastDealIds().size} deal${getForecastDealIds().size !== 1 ? 's' : ''} selecionados</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="kpi-label">Forecast de Farming</div>
        <div class="kpi-value" style="color:var(--accent4);font-size:22px" id="goal-forecast-farming-mrr">${fmtBRL(farming.pendingMrr)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-forecast-farming-count">${farming.pending.length} conta${farming.pending.length !== 1 ? 's' : ''} pendentes</div>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card" style="text-align:center">
        <div class="kpi-label">Receita Hunting (deals ganhos no período)</div>
        <div class="kpi-value" style="color:var(--accent2);font-size:22px" id="goal-hunting-mrr">${fmtBRL(huntingMrr)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-hunting-deals">${totalWonDeals} deals fechados</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="kpi-label">Receita Farming Realizada</div>
        <div class="kpi-value" style="color:var(--accent4);font-size:22px" id="goal-farming-mrr">${fmtBRL(farmingMrr)}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px" id="goal-farming-count">${farming.realized.length} conta${farming.realized.length !== 1 ? 's' : ''} · <span style="color:var(--text3)">${fmtBRL(farming.pendingMrr)} pendente</span></div>
      </div>
    </div>`;

  // Tabela por owner — sem coluna Meta Deals
  const ownerRows = owners.map((o, i) => {
    const goalMrr = getGoalMrr(o.owner_id);
    const periodMrr = o.won_mrr_this_period || 0;
    const periodDeals = o.won_this_period || 0;
    const pct = goalMrr > 0 ? Math.min(Math.round(periodMrr / goalMrr * 100), 100) : 0;
    return `
    <tr>
      <td>
        <div class="rep-cell">
          <div class="avatar" style="background:${avatarColor(i)}">${initials(o.owner_name)}</div>
          <div style="font-weight:600">${o.owner_name}</div>
        </div>
      </td>
      <td>
        <input class="inline-input" type="number" placeholder="0" style="width:110px"
          value="${goalMrr || ''}"
          oninput="localStorage.setItem('moveo_goals_individual_${o.owner_id}', this.value); refreshAllIndGoals(); renderGoalProgress()">
      </td>
      <td style="color:var(--won);font-weight:600" id="goals-mrr-${o.owner_id}">${fmtBRL(periodMrr)}</td>
      <td style="font-weight:600" id="goals-deals-${o.owner_id}">${periodDeals}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" id="prg-mrr-${o.owner_id}" style="width:${pct}%;background:var(--won)"></div></div>
          <div class="progress-pct" style="color:var(--won)" id="prg-pct-${o.owner_id}">${pct}%</div>
        </div>
      </td>
    </tr>`;
  }).join('');

  const ownerTable = `
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">Metas por Responsável</div>
        <div style="font-size:11px;color:var(--text2)">Metas definidas na aba Individual · dados do período selecionado</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Rep</th>
            <th>Meta MRR (R$)</th>
            <th>MRR Fechado</th>
            <th>Deals Fechados</th>
            <th>% da Meta</th>
          </tr></thead>
          <tbody id="goals-table-body">${ownerRows}</tbody>
          <tfoot>
            <tr style="background:var(--surface2)">
              <td><strong>TOTAL TIME</strong></td>
              <td style="font-weight:700" id="goals-total-mrr">${fmtBRL(totalGoal)}</td>
              <td style="color:var(--won);font-weight:700" id="goals-total-won-mrr">${fmtBRL(totalWonMrr)}</td>
              <td style="font-weight:700" id="goals-total-won-deals">${totalWonDeals}</td>
              <td>
                <div class="progress-wrap">
                  <div class="progress-track"><div class="progress-fill" id="goal-team-bar2" style="width:${teamGoalPct}%;background:var(--won)"></div></div>
                  <div class="progress-pct" style="color:var(--won)" id="goal-team-pct2">${teamGoalPct}%</div>
                </div>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;

  // Card de projeção de contratos
  const projectionCard = `
    <div class="card">
      <div class="card-header"><div class="card-title">Projeção de Contratos Necessários</div></div>
      <div class="grid-3">
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">Deals no funil agora</div>
          <div class="kpi-value" style="color:var(--accent)">${totalActiveDeals}</div>
        </div>
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">Projeção de fechamento</div>
          <div class="kpi-value" style="color:var(--accent2)">${Math.round(totalActiveDeals * winRate / 100)}</div>
          <div style="font-size:11px;color:var(--text2)">deals × win rate</div>
        </div>
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">Gap p/ atingir meta</div>
          <div class="kpi-value" style="color:var(--accent3)" id="goal-gap">${contractsNeeded > 0 ? Math.max(contractsNeeded - Math.round(totalActiveDeals * winRate / 100), 0) : '—'}</div>
          <div style="font-size:11px;color:var(--text2)">contratos adicionais</div>
        </div>
      </div>
    </div>`;

  // ── Ritmo de fechamento ─────────────────────────────────────────────────────
  const curMonth       = (d.months || []).find(m => m.isCurrent) || {};
  const wonDealsMonth  = curMonth.period_won_deals || [];
  const nowD           = new Date();
  const yr2 = nowD.getUTCFullYear(), mo2 = nowD.getUTCMonth() + 1;
  const daysInMonth    = new Date(Date.UTC(yr2, mo2, 0)).getUTCDate();
  const dayOfMonth     = nowD.getUTCDate();
  const daysElapsed    = dayOfMonth;
  const daysRemaining  = Math.max(daysInMonth - dayOfMonth, 0);
  const gap            = Math.max(totalGoal - totalRealized, 0);
  const paceNeeded     = daysRemaining > 0 ? gap / daysRemaining : 0;
  const paceActual     = daysElapsed  > 0 ? totalRealized / daysElapsed : 0;
  const onTrack        = totalGoal === 0 || paceActual >= paceNeeded * 0.95;
  const paceColor      = totalGoal === 0 ? 'var(--text2)' : onTrack ? 'var(--won)' : 'var(--lost)';
  const statusLabel    = totalGoal === 0 ? '—' : onTrack ? '✓ No ritmo' : '↓ Abaixo';

  const paceCard = `
    <div class="card" style="margin-top:20px">
      <div class="card-header">
        <div class="card-title">Ritmo de Fechamento</div>
        <span style="font-size:11px;font-weight:600;color:${paceColor}">${statusLabel}</span>
      </div>
      <div class="grid-4" style="margin-bottom:18px">
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">MRR Fechado (Mês)</div>
          <div class="kpi-value" style="color:var(--won);font-size:20px" id="pace-realized">${fmtBRL(totalRealized)}</div>
          <div style="font-size:11px;color:var(--text2)">dia ${dayOfMonth} de ${daysInMonth}</div>
        </div>
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">Falta Fechar</div>
          <div class="kpi-value" style="color:${gap > 0 ? 'var(--lost)' : 'var(--won)'};font-size:20px" id="pace-gap">${fmtBRL(gap)}</div>
          <div style="font-size:11px;color:var(--text2)">${daysRemaining} dias restantes</div>
        </div>
        <div class="card" style="background:var(--surface2);border:none;text-align:center">
          <div class="kpi-label">Pace Atual</div>
          <div class="kpi-value" style="color:var(--accent);font-size:20px">${fmtBRL(Math.round(paceActual))}<span style="font-size:12px;font-weight:400;color:var(--text2)">/dia</span></div>
          <div style="font-size:11px;color:var(--text2)">acumulado ÷ dias passados</div>
        </div>
        <div class="card" style="background:var(--surface2);border:none;text-align:center;border-left:3px solid ${paceColor}">
          <div class="kpi-label">Precisa Fechar/dia</div>
          <div class="kpi-value" style="color:${paceColor};font-size:20px" id="pace-needed">${fmtBRL(Math.round(paceNeeded))}<span style="font-size:12px;font-weight:400;color:var(--text2)">/dia</span></div>
          <div style="font-size:11px;color:var(--text2)">para atingir a meta</div>
        </div>
      </div>
      <div style="position:relative;height:200px"><canvas id="goal-burnup-chart"></canvas></div>
    </div>`;

  return `
  <div id="tab-goals" class="tab-content">
    <div class="info-chip"><span class="icon">ℹ️</span> As metas individuais são definidas na aba <strong>Individual</strong> (campo "Meta MRR do Mês"). Os dados de MRR e Deals refletem o período selecionado no filtro.</div>
    ${topCards}
    ${ownerTable}
    ${projectionCard}
    ${paceCard}
  </div>`;
}

function renderGoalProgress() {
  if (!DATA) return;
  const FEATURED = ["henrique", "arnaldo", "benedetti", "bomfim", "bomfin", "bonfim"];
  const allOwners = (CURRENT_BY_OWNER.length ? CURRENT_BY_OWNER : DATA.by_owner) || [];
  const owners = allOwners.filter(o =>
    FEATURED.some(name => (o.owner_name || '').toLowerCase().includes(name))
  );
  let totalGoal = 0, totalWonMrr = 0, totalWonDeals = 0;

  owners.forEach(o => {
    const gMrr = parseFloat(localStorage.getItem('moveo_goals_individual_' + o.owner_id) || '0');
    const periodMrr = o.won_mrr_this_period || 0;
    const periodDeals = o.won_this_period || 0;
    totalGoal     += gMrr;
    totalWonMrr   += periodMrr;
    totalWonDeals += periodDeals;

    const pct = gMrr > 0 ? Math.min(Math.round(periodMrr / gMrr * 100), 100) : 0;
    const elBar   = document.getElementById('prg-mrr-'    + o.owner_id);
    const elPct   = document.getElementById('prg-pct-'    + o.owner_id);
    const elMrr   = document.getElementById('goals-mrr-'  + o.owner_id);
    const elDeals = document.getElementById('goals-deals-'+ o.owner_id);
    if (elBar)   elBar.style.width = pct + '%';
    if (elPct)   elPct.textContent = pct + '%';
    if (elMrr)   elMrr.textContent = fmtBRL(periodMrr);
    if (elDeals) elDeals.textContent = periodDeals;
  });

  // totalGoal: lê apenas os inputs visíveis na tabela (evita incluir sellers fora da tabela)
  const tableGoal = Array.from(document.querySelectorAll('#goals-table-body input[type="number"]'))
    .reduce((a, el) => a + (parseFloat(el.value) || 0), 0);
  const effectiveGoal = tableGoal || totalGoal;
  const teamPct = effectiveGoal > 0 ? Math.min(Math.round(totalWonMrr / effectiveGoal * 100), 100) : 0;

  // Simulação: ticket médio histórico (all-time) dos sellers na tabela
  const FEATURED2 = ["henrique", "arnaldo", "benedetti", "bomfim", "bomfin", "bonfim"];
  const allTimeOwners = (DATA.by_owner || []).filter(o =>
    FEATURED2.some(n => (o.owner_name || '').toLowerCase().includes(n))
  );
  const atMrr   = allTimeOwners.reduce((a, o) => a + (o.won_mrr   || 0), 0);
  const atDeals = allTimeOwners.reduce((a, o) => a + (o.won_total || 0), 0);
  const avgTicket = atDeals > 0 ? atMrr / atDeals : 0;
  const contractsNeeded = avgTicket > 0 ? Math.ceil(effectiveGoal / avgTicket) : 0;

  const setEl = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  const setW  = (id, v) => { const e = document.getElementById(id); if (e) e.style.width = v; };
  setEl('goal-total-display',    fmtBRL(effectiveGoal));
  setEl('goals-total-mrr',       fmtBRL(effectiveGoal));
  setEl('goals-total-won-mrr',   fmtBRL(totalWonMrr));
  setEl('goals-total-won-deals', totalWonDeals);
  setEl('goal-contracts-needed', contractsNeeded || '—');
  setEl('goal-sim-subtitle',     `Ticket médio histórico: ${fmtBRL(avgTicket)}`);

  // Hunting vs Farming vs Forecast
  const farming = splitFarmingByDate();
  const farmingMrr = farming.realizedMrr; // só data_prevista ≤ hoje
  const forecastMrr = getForecastTotalMrr();
  const forecastCount = getForecastDealIds().size;

  // Realizado = hunting + farming realizado; recalcula barra e %
  const totalRealized = totalWonMrr + farmingMrr;
  const realizedPct = effectiveGoal > 0 ? Math.min(Math.round(totalRealized / effectiveGoal * 100), 100) : 0;
  setW('goal-team-bar',  realizedPct + '%');
  setW('goal-team-bar2', realizedPct + '%');
  setEl('goal-team-pct',  realizedPct + '%');
  setEl('goal-team-pct2', realizedPct + '%');
  setEl('goal-team-realized',  fmtBRL(totalRealized));
  setEl('goal-hunting-inline', fmtBRL(totalWonMrr));
  setEl('goal-farming-inline', fmtBRL(farmingMrr));

  setEl('goal-hunting-mrr',    fmtBRL(totalWonMrr));
  setEl('goal-hunting-deals',  totalWonDeals + ' deals fechados');
  setEl('goal-farming-mrr',    fmtBRL(farmingMrr));
  setEl('goal-farming-count',  farming.realized.length + ' conta' + (farming.realized.length !== 1 ? 's' : '') + ' · ' + fmtBRL(farming.pendingMrr) + ' pendente');
  setEl('goal-forecast-mrr',          fmtBRL(forecastMrr + farming.pendingMrr));
  setEl('goal-forecast-sales-mrr',    fmtBRL(forecastMrr));
  setEl('goal-forecast-sales-count',  forecastCount + ' deal' + (forecastCount !== 1 ? 's' : '') + ' selecionados');
  setEl('goal-forecast-farming-mrr',  fmtBRL(farming.pendingMrr));
  setEl('goal-forecast-farming-count',farming.pending.length + ' conta' + (farming.pending.length !== 1 ? 's' : '') + ' pendentes');
}

// ── Forecast helpers ──────────────────────────────────────────────────────────
function getForecastDealIds() {
  return new Set(FORECAST_CACHE?.deals || []);
}
function getForecastTotalMrr() {
  if (!DATA) return 0;
  const ids = getForecastDealIds();
  return (DATA.active_deals || []).filter(d => ids.has(d.id)).reduce((a, d) => a + (d.amount || 0), 0);
}
function saveForecastDealIds(set) {
  if (!FORECAST_CACHE) FORECAST_CACHE = { deals: [], ps: {}, obs: {}, backlog: [], prio: {} };
  FORECAST_CACHE.deals = [...set];
  saveToStorage('forecast', FORECAST_CACHE);
}
function toggleForecastDeal(dealId) {
  const ids = getForecastDealIds();
  if (ids.has(dealId)) ids.delete(dealId); else ids.add(dealId);
  saveForecastDealIds(ids);
  renderForecastTab();
  renderGoalProgress();
}

// ── Forecast ──────────────────────────────────────────────────────────────────
function buildForecast(d) {
  const fc = d.forecast;
  const fallbackNote = fc.fallback_deals_count > 0
    ? `<div class="warn-chip">⚠️ ${fc.fallback_deals_count} deal(s) com valor estimado (fallback de plano). Valores de pipeline podem estar imprecisos.</div>`
    : '';

  return `

function toggleFcSelector() {
  const body = document.getElementById('fc-selector-body');
  const toggle = document.getElementById('fc-selector-toggle');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (toggle) toggle.textContent = open ? '▼ Expandir' : '▲ Recolher';
  if (!open) renderFcSelectorTable();
}

function renderFcSelectorTable() {
  if (!DATA) return;
  const wrap = document.getElementById('fc-selector-table-wrap');
  if (!wrap) return;
  const searchEl = document.getElementById('fc-search');
  const search = (searchEl ? searchEl.value : '').toLowerCase();
  const ids = getForecastDealIds();
  let deals = [...(DATA.active_deals || [])].sort((a, b) => (b.amount || 0) - (a.amount || 0));
  if (search) {
    deals = deals.filter(d =>
      (d.name || '').toLowerCase().includes(search) ||
      (d.owner_name || '').toLowerCase().includes(search)
    );
  }
  if (!deals.length) {
    wrap.innerHTML = '<div style="color:var(--text2);padding:16px;font-size:12px">Nenhum deal encontrado.</div>';
    return;
  }
  const rows = deals.map(deal => {
    const checked = ids.has(deal.id);
    return `<tr style="cursor:pointer" onclick="toggleForecastDeal('${deal.id}')">
      <td><input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation();toggleForecastDeal('${deal.id}')"></td>
      <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(deal.name||'')}">${deal.name || '—'}</td>
      <td style="font-size:11px">${deal.owner_name || '—'}</td>
      <td><span class="segment-badge segment-${(deal.segment||'').toLowerCase()}">${deal.segment || '—'}</span></td>
      <td><span class="stage-pill ${stagePillClass(deal.stage_name)}">${deal.stage_name}</span></td>
      <td style="font-weight:600;color:${deal.amount_fallback ? 'var(--accent4)' : 'var(--text)'}">${fmtBRL(deal.amount)}${deal.amount_fallback ? '<span class="fallback-tag">est.</span>' : ''}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table>
    <thead><tr><th style="width:32px"></th><th>Deal</th><th>Owner</th><th>Segmento</th><th>Estágio</th><th>MRR</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── drag & drop state ────────────────────────────────────────────────────────
let _fcDragged = null;

function _fcAddDragEvents(tr, fromBodyId) {
  tr.addEventListener('dragstart', e => {
    _fcDragged = tr;
    setTimeout(() => tr.classList.add('fc-dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  tr.addEventListener('dragend', () => {
    tr.classList.remove('fc-dragging');
    document.querySelectorAll('.fc-row-drag-over').forEach(el => el.classList.remove('fc-row-drag-over'));
    document.getElementById('fc-drop-empty')?.classList.remove('fc-drag-over');
  });
  tr.addEventListener('dragover', e => { e.preventDefault(); if (_fcDragged !== tr) tr.classList.add('fc-row-drag-over'); });
  tr.addEventListener('dragleave', () => tr.classList.remove('fc-row-drag-over'));
  tr.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    tr.classList.remove('fc-row-drag-over');
    if (!_fcDragged || _fcDragged === tr) return;
    const src = _fcDragged.closest('tbody')?.id;
    const tgt = tr.closest('tbody')?.id;
    if (!src || !tgt) return;
    if (src === tgt) {
      tr.closest('tbody').insertBefore(_fcDragged, tr);
    } else if (src === 'fc-tbody-forecast' && tgt === 'fc-tbody-backlog') {
      const nr = _fcBuildBacklogRow(_fcDragged); _fcDragged.remove();
      tr.closest('tbody').insertBefore(nr, tr);
    } else if (src === 'fc-tbody-backlog' && tgt === 'fc-tbody-forecast') {
      const nr = _fcBuildForecastRow(_fcDragged); _fcDragged.remove();
      tr.closest('tbody').insertBefore(nr, tr);
    }
    _fcUpdateKpis(); saveFcBacklog();
  });
}

function _fcBuildBacklogRow(tr) {
  const d = tr.dataset;
  const cells = [...tr.querySelectorAll('td')];
  // forecast cells: 0=name,1=owner,2=seg,3=stage,4=mrr,5=ps-input,6=bk12,7=obs-input,8=actions
  const obsEl = cells[7]?.querySelector('input');
  const obsVal = obsEl ? escHtml(obsEl.value) : '';
  const prio = FORECAST_CACHE?.prio?.[d.id] || null;
  const nr = document.createElement('tr');
  nr.draggable = true;
  nr.dataset.id = d.id; nr.dataset.mrr = d.mrr; nr.dataset.bk = d.bk;
  if (prio) nr.classList.add(`fc-prio-${prio}`);
  nr.innerHTML = `
    <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${cells[0].getAttribute('title')||''}">${cells[0].textContent.trim()}</td>
    <td style="font-size:11px">${cells[1].textContent.trim()}</td>
    <td>${cells[2].innerHTML}</td>
    <td>${cells[3].innerHTML}</td>
    <td style="font-weight:600">${cells[4].textContent.trim()}</td>
    <td style="font-weight:600;color:var(--accent4)">${cells[6].textContent.trim()}</td>
    <td><input class="inline-input" type="text" value="${obsVal}" placeholder="Observações" style="width:130px" oninput="saveFcBacklog()"></td>
    <td style="white-space:nowrap">
      <button class="btn-prio${prio ? ` prio-${prio}` : ''}" onclick="cycleFcPrio(this)" title="Prioridade"><span class="prio-dot"></span></button>
      <button class="btn-bk" onclick="_fcMoveToForecast(this)" title="Mover para Forecast">↑ Fore.</button>
    </td>`;
  _fcAddDragEvents(nr, 'fc-tbody-backlog');
  return nr;
}

function _fcBuildForecastRow(tr) {

  if (prio) nr.classList.add(`fc-prio-${prio}`);

    <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${cells[0].getAttribute('title')||''}">${cells[0].textContent.trim()}</td>
    <td style="font-size:11px">${cells[1].textContent.trim()}</td>
