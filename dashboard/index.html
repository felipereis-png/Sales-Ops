function _fcMoveToForecast(btn) {
  const tr = btn.closest('tr');
  const nr = _fcBuildForecastRow(tr);
  tr.remove();
  document.getElementById('fc-tbody-forecast').appendChild(nr);
  _fcUpdateKpis(); saveFcBacklog();
}

function _fcMoveToBacklog(btn) {
  const tr = btn.closest('tr');
  const nr = _fcBuildBacklogRow(tr);
  tr.remove();
  document.getElementById('fc-tbody-backlog').appendChild(nr);
  _fcUpdateKpis(); saveFcBacklog();
}

function _fcUpdateKpis() {
  let fMrr = 0, fPs = 0, fBk = 0, bMrr = 0;
  document.querySelectorAll('#fc-tbody-forecast tr').forEach(tr => {
    fMrr += parseFloat(tr.dataset.mrr) || 0;
    fBk  += parseFloat(tr.dataset.bk)  || 0;
    const inp = tr.querySelector('input[type=number]');
    fPs += inp ? (parseFloat(inp.value) || 0) : 0;
  });
  document.querySelectorAll('#fc-tbody-backlog tr').forEach(tr => {
    bMrr += parseFloat(tr.dataset.mrr) || 0;
  });
  const totalBk12 = fBk + fPs;
  const fc = document.querySelectorAll('#fc-tbody-forecast tr').length;
  const bc = document.querySelectorAll('#fc-tbody-backlog tr').length;
  const setEl = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  setEl('fc-expected-mrr',    fmtBRL(fMrr));
  setEl('fc-bookings-12m',    fmtBRL(totalBk12));
  setEl('fc-backlog-mrr',     fmtBRL(bMrr));
  setEl('fc-pipeline-total',  fmtBRL(fMrr + bMrr));
  setEl('fc-deal-count',      `${fc} deal${fc !== 1 ? 's' : ''}`);
  setEl('fc-backlog-count',   `${bc} deal${bc !== 1 ? 's' : ''}`);
  setEl('fc-panel-deal-count',   `${fc} deal${fc !== 1 ? 's' : ''}`);
  setEl('fc-panel-backlog-count', `${bc} deal${bc !== 1 ? 's' : ''}`);
  // totals row
  const ft = document.getElementById('fc-forecast-total');
  if (ft) {
    ft.querySelector('.fc-total-mrr').textContent  = fmtBRL(fMrr);
    ft.querySelector('.fc-total-ps').textContent   = fmtBRL(fPs);
    ft.querySelector('.fc-total-bk').textContent   = fmtBRL(totalBk12);
  }
  const bt = document.getElementById('fc-backlog-total');
  if (bt) {
    bt.style.display = bc ? '' : 'none';
    bt.querySelector('.fc-total-mrr').textContent = fmtBRL(bMrr);
  }
  const dropEmpty = document.getElementById('fc-drop-empty');
  if (dropEmpty) dropEmpty.style.display = bc ? 'none' : 'block';

  // Stage KPIs (só forecast)
  const stageMap = { contract: 'Contract Sent', verbal: 'Verbal Agreement', poc: 'POC', proposal: 'Commercial Proposal' };
  const stageTotals = {};
  Object.values(stageMap).forEach(s => { stageTotals[s] = { mrr: 0, count: 0 }; });
  document.querySelectorAll('#fc-tbody-forecast tr').forEach(tr => {
    const s = tr.dataset.stage || '';
    if (stageTotals[s]) { stageTotals[s].mrr += parseFloat(tr.dataset.mrr) || 0; stageTotals[s].count++; }
  });
  Object.entries(stageMap).forEach(([key, stageName]) => {
    const v = stageTotals[stageName];
    setEl(`fc-stage-${key}`,       fmtBRL(v.mrr));
    setEl(`fc-stage-${key}-count`, `${v.count} deal${v.count !== 1 ? 's' : ''}`);
  });

  // Priority KPIs (forecast + backlog)
  const prioTotals = { red: { mrr: 0, count: 0 }, yellow: { mrr: 0, count: 0 }, green: { mrr: 0, count: 0 } };
  document.querySelectorAll('#fc-tbody-forecast tr, #fc-tbody-backlog tr').forEach(tr => {
    const p = FORECAST_CACHE?.prio?.[tr.dataset.id];
    if (prioTotals[p]) { prioTotals[p].mrr += parseFloat(tr.dataset.mrr) || 0; prioTotals[p].count++; }
  });
  ['red','yellow','green'].forEach(p => {
    const v = prioTotals[p];
    setEl(`fc-prio-${p}`,       fmtBRL(v.mrr));
    setEl(`fc-prio-${p}-count`, `${v.count} deal${v.count !== 1 ? 's' : ''}`);
  });

  // By-owner breakdown
  const ownerWrap = document.getElementById('fc-by-owner-wrap');
  if (ownerWrap) {
    const ownerMap = {};
    document.querySelectorAll('#fc-tbody-forecast tr').forEach(tr => {
      const owner = tr.dataset.owner || '—';
      const mrr = parseFloat(tr.dataset.mrr) || 0;
      const bk  = parseFloat(tr.dataset.bk)  || 0;
      const inp = tr.querySelector('input[type=number]');
      const ps  = inp ? (parseFloat(inp.value) || 0) : 0;
      if (!ownerMap[owner]) ownerMap[owner] = { mrr: 0, bk: 0, ps: 0, count: 0 };
      ownerMap[owner].mrr   += mrr;
      ownerMap[owner].bk    += bk;
      ownerMap[owner].ps    += ps;
      ownerMap[owner].count += 1;
    });
    const entries = Object.entries(ownerMap).sort((a, b) => b[1].mrr - a[1].mrr);
    const maxMrr = entries[0]?.[1].mrr || 1;
    if (!entries.length) {
      ownerWrap.innerHTML = '<div style="color:var(--text2);font-size:12px;padding:8px 0">Nenhum deal no forecast.</div>';
    } else {
      ownerWrap.innerHTML = entries.map(([name, v]) => `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="min-width:130px;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
          <div style="flex:1;height:6px;background:var(--surface3);border-radius:3px">
            <div style="width:${Math.round(v.mrr/maxMrr*100)}%;height:100%;background:var(--accent);border-radius:3px"></div>
          </div>
          <div style="min-width:90px;text-align:right;font-size:12px;font-weight:600;color:var(--accent)">${fmtBRL(v.mrr)}</div>
          <div style="min-width:38px;text-align:right;font-size:11px;color:var(--text2)">${v.count} deal${v.count !== 1 ? 's' : ''}</div>
        </div>`).join('');
    }
  }
}

const FC_STAGE_ORDER = ['Meeting Scheduled','Assessment','Product Demo','Commercial Proposal','POC','Verbal Agreement','Contract Sent'];

function sortForecastBy(col) {
  FC_SORT = FC_SORT.col === col ? { col, dir: FC_SORT.dir * -1 } : { col, dir: 1 };
  renderForecastTab();
}

function _fcSortDeals(deals) {
  if (!FC_SORT.col) return deals;
  const { col, dir } = FC_SORT;
  return [...deals].sort((a, b) => {
    let av, bv;
    if (col === 'name')    { av = (a.name || '').toLowerCase();       bv = (b.name || '').toLowerCase(); }
    if (col === 'owner')   { av = (a.owner_name || '').toLowerCase(); bv = (b.owner_name || '').toLowerCase(); }
    if (col === 'segment') { av = (a.segment || '').toLowerCase();    bv = (b.segment || '').toLowerCase(); }
    if (col === 'stage')   { av = FC_STAGE_ORDER.indexOf(a.stage_name); bv = FC_STAGE_ORDER.indexOf(b.stage_name); }
    if (col === 'prio')    { const o = {red:3,yellow:2,green:1}; av = o[FORECAST_CACHE?.prio?.[a.id]] || 0; bv = o[FORECAST_CACHE?.prio?.[b.id]] || 0; }
    if (col === 'mrr')     { av = a.amount || 0;                      bv = b.amount || 0; }
    if (col === 'ps')      { av = parseFloat(FORECAST_CACHE?.ps?.[a.id] || 0); bv = parseFloat(FORECAST_CACHE?.ps?.[b.id] || 0); }
    if (col === 'bk')      { av = (a.amount||0)*12 + parseFloat(FORECAST_CACHE?.ps?.[a.id]||0); bv = (b.amount||0)*12 + parseFloat(FORECAST_CACHE?.ps?.[b.id]||0); }
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;
  });
}

function _fcThHtml(label, col) {
  const active = FC_SORT.col === col;
  const arrow  = active ? (FC_SORT.dir === 1 ? ' ↑' : ' ↓') : '';
  const style  = `cursor:pointer;user-select:none;white-space:nowrap${active ? ';color:var(--accent)' : ''}`;
  return `<th style="${style}" onclick="sortForecastBy('${col}')">${label}${arrow}</th>`;
}

function renderForecastTab() {
  if (!DATA) return;

  const selectorBody = document.getElementById('fc-selector-body');
  if (selectorBody && selectorBody.style.display !== 'none') renderFcSelectorTable();

  const fWrap = document.getElementById('fc-forecast-table-wrap');
  const bWrap = document.getElementById('fc-backlog-table-wrap');
  if (!fWrap || !bWrap) return;

  const ids = getForecastDealIds();
  const allDeals = DATA.active_deals || [];
  const backlogIds = new Set(FORECAST_CACHE?.backlog || []);
  const backlogHot = FORECAST_CACHE?.backlog_hot || {};

  // deals in forecast = selected but not in backlog
  const forecastDeals = allDeals.filter(d => ids.has(d.id) && !backlogIds.has(d.id));
  // deals in backlog = selected AND in backlog

        </td>`;

  // ── Backlog panel drop zone ───────────────────────────────────────────────
  ['fc-panel-forecast','fc-panel-backlog'].forEach(pid => {
    const panel = document.getElementById(pid);
    if (!panel) return;
    panel.addEventListener('dragover', e => {
      e.preventDefault();
      if (pid === 'fc-panel-backlog') document.getElementById('fc-drop-empty')?.classList.add('fc-drag-over');
    });
    panel.addEventListener('dragleave', e => {
      if (!panel.contains(e.relatedTarget)) document.getElementById('fc-drop-empty')?.classList.remove('fc-drag-over');
    });
    panel.addEventListener('drop', e => {
      e.preventDefault();
      document.getElementById('fc-drop-empty')?.classList.remove('fc-drag-over');
      if (!_fcDragged) return;
      const src = _fcDragged.closest('tbody')?.id;
      if (pid === 'fc-panel-backlog' && src === 'fc-tbody-forecast') {
        const nr = _fcBuildBacklogRow(_fcDragged); _fcDragged.remove();

        <td>—</td><td>—</td><td></td>
      </tr>
    </tfoot>
  </table>`;

  const bTbody = document.getElementById('fc-tbody-backlog');
  backlogDeals.forEach(deal => {
    const mrr  = deal.amount || 0;
    const bk12 = mrr * 12;
    const obs  = FORECAST_CACHE?.obs?.[deal.id] || '';
    const prio = FORECAST_CACHE?.prio?.[deal.id] || null;
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.id  = deal.id;
    tr.dataset.mrr = mrr;
    tr.dataset.bk  = bk12;
    if (prio) tr.classList.add(`fc-prio-${prio}`);
    tr.innerHTML = `
      <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escHtml(deal.name||'')}">${deal.name || '—'}</td>

        <button class="btn-bk" onclick="_fcMoveToForecast(this)" title="Mover para Forecast">↑ Fore.</button>
      </td>`;
    _fcAddDragEvents(tr, 'fc-tbody-backlog');
    bTbody.appendChild(tr);
  });

  _fcUpdateKpis();
}

// ── Farming ───────────────────────────────────────────────────────────────────
function loadFarmingData() {
  return FARMING_CACHE || [];
}

// Separa farming em realizado (data_prevista ≤ hoje) vs pendente (data futura ou sem data)
function splitFarmingByDate() {
  const rows = loadFarmingData();
  const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
  const realized = rows.filter(r => r.data_prevista && r.data_prevista <= today);
  const pending  = rows.filter(r => !r.data_prevista || r.data_prevista > today);
  return {
    realized, pending,
    realizedMrr: realized.reduce((a, r) => a + (parseFloat(r.mrr_esperado) || 0), 0),
    pendingMrr:  pending.reduce((a, r)  => a + (parseFloat(r.mrr_esperado) || 0), 0),
  };
}
function saveFarmingData(rows) {
  FARMING_CACHE = rows;
  saveToStorage('farming', rows);
}

function renderFarmingTable() {
  const tbody = document.getElementById('farming-tbody');
  if (!tbody) return;
  const rows = loadFarmingData();
  const ownerOptsSrc = document.getElementById('farming-owner-opts-src');
  const ownerOpts = ownerOptsSrc ? ownerOptsSrc.innerHTML : '';

  tbody.innerHTML = rows.map(row => farmingRowHtml(row, ownerOpts)).join('');
  updateFarmingTotals();
}

function farmingRowHtml(row, ownerOpts) {
  // If ownerOpts not passed, build from existing select
  if (!ownerOpts) {
    const src = document.getElementById('farming-owner-opts-src');
    ownerOpts = src ? src.innerHTML : '';
  }
  // Build owner select with current value pre-selected
  const ownerOptsWithSel = ownerOpts.replace(
    `value="${row.responsavel}"`,
    `value="${row.responsavel}" selected`
  );
  return `
  <tr id="farming-row-${row.id}">
    <td><input class="inline-input" type="text" value="${escHtml(row.conta||'')}" placeholder="Nome da conta" style="width:140px" oninput="updateFarmingField('${row.id}','conta',this.value)"></td>

      </select>

      <button onclick="deleteFarmingRow('${row.id}')" style="background:rgba(255,107,107,.15);border:none;color:var(--lost);cursor:pointer;border-radius:4px;padding:3px 7px;font-size:13px" title="Remover">✕</button>

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addFarmingRow() {
  const rows = loadFarmingData();
  const newRow = { id: Date.now().toString(), conta: '', responsavel: '', mrr_atual: 0, mrr_esperado: 0, ps: 0, tipo: 'Upsell MRR', data_prevista: '' };
  rows.push(newRow);
  saveFarmingData(rows);
  renderFarmingTable();
}

function deleteFarmingRow(id) {
  const rows = loadFarmingData().filter(r => r.id !== id);
  saveFarmingData(rows);
  renderFarmingTable();
}

function updateFarmingField(id, field, value) {
  const rows = loadFarmingData();
  const row = rows.find(r => r.id === id);
  if (row) {
    row[field] = value;
    saveFarmingData(rows);
    updateFarmingTotals();
    if (field === 'mrr_esperado') renderGoalProgress();
  }
}

function updateFarmingTotals() {
  const rows = loadFarmingData();
  const totalMrrAtual = rows.reduce((a, r) => a + (parseFloat(r.mrr_atual) || 0), 0);
  const totalMrrEsp   = rows.reduce((a, r) => a + (parseFloat(r.mrr_esperado) || 0), 0);
  const totalPs       = rows.reduce((a, r) => a + (parseFloat(r.ps) || 0), 0);
  const deltaMrr      = totalMrrEsp - totalMrrAtual;
  const receitaTotal  = deltaMrr + totalPs;

  const setEl = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  setEl('farming-total-mrr-atual', fmtBRL(totalMrrAtual));
  setEl('farming-total-mrr-esp',   fmtBRL(totalMrrEsp));
  setEl('farming-total-ps',        fmtBRL(totalPs));
  setEl('farming-delta-mrr',       fmtBRL(deltaMrr));
  setEl('farming-total-ps-card',   fmtBRL(totalPs));
  setEl('farming-receita-total',   fmtBRL(receitaTotal));
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportJSON() {
  if (!DATA) return;
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `moveo-snapshot-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function onQuickPeriod(val) {
  const customEl = document.getElementById('custom-dates');
  if (val === 'custom') {
    customEl.style.display = 'flex';
    return;
  }
  customEl.style.display = 'none';
  const idx = parseInt(val.replace('week-', ''));
  applyWeekFilter(idx);
}

async function applyCustomRange() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) return;

  document.getElementById('period-label').textContent = `${from} → ${to}`;
  document.getElementById('sync-status').textContent = '🔄 Buscando…';

  try {
    const r = await fetch(`/api/snapshot?from=${from}&to=${to}`);
    const d = await r.json();
    applyPeriodData(d.current_week, d.by_owner, d.sources, `${from} → ${to}`, null, d.mkt_funnel, d.lost_reasons, d.segments_period, d.source_funnel, d.period_won_deals, d.period_weeks);
    fetchCampaigns(from, to);
    document.getElementById('sync-status').textContent = '✅ HubSpot · filtro custom';
  } catch(e) {
    document.getElementById('sync-status').textContent = '❌ Erro no filtro';
  }
}

function applyWeekFilter(idxStr) {
  if (!DATA) return;
  ACTIVE_WEEK_IDX = parseInt(idxStr);
  const week = DATA.weeks[ACTIVE_WEEK_IDX];

  applyPeriodData(
    week.metrics,
    week.by_owner,
    week.sources,
    week.short_label,
    ACTIVE_WEEK_IDX > 0 ? DATA.weeks[ACTIVE_WEEK_IDX - 1].metrics : null,
    week.mkt_funnel,
    week.lost_reasons,
    week.segments_period,
    week.source_funnel,
    week.period_won_deals
  );
}

function renderGoalBurnup(d) {
  try {
    const canvas = document.getElementById('goal-burnup-chart');
    if (!canvas) return;
    if (_goalsBurnupChart) { _goalsBurnupChart.destroy(); _goalsBurnupChart = null; }

    // Metas
    const allOwners = d.by_owner || [];
    const FEATURED  = ["henrique", "arnaldo", "benedetti", "bomfim", "bomfin", "bonfim"];
    const owners    = allOwners.filter(o => FEATURED.some(n => (o.owner_name||'').toLowerCase().includes(n)));
    const getGoal   = oid => parseFloat(localStorage.getItem('moveo_goals_individual_' + oid) || '0');
    const totalGoal = owners.reduce((a, o) => a + getGoal(o.owner_id), 0);
    if (!totalGoal) return;

    const curMonth      = (d.months || []).find(m => m.isCurrent) || {};
    const wonDeals      = curMonth.period_won_deals || [];
    const nowD          = new Date();
    const yr2 = nowD.getUTCFullYear(), mo2 = nowD.getUTCMonth() + 1;
    const daysInMonth   = new Date(Date.UTC(yr2, mo2, 0)).getUTCDate();
    const dayOfMonth    = nowD.getUTCDate();

    // Farming realizado
    const farming = splitFarmingByDate ? splitFarmingByDate() : { realizedMrr: 0 };
    const farmingMrr = farming.realizedMrr || 0;

    // Daily won MRR
    const dailyMap = {};
    for (const deal of wonDeals) {
      if (!deal.won_date) continue;
      const day = new Date(deal.won_date).getUTCDate();
      dailyMap[day] = (dailyMap[day] || 0) + (deal.amount || 0);
    }

    const labels = Array.from({length: daysInMonth}, (_, i) => String(i + 1));

    // Actual cumulative (hunting only from HubSpot won dates)
    const actualData = [];
    let cum = 0;
    for (let day = 1; day <= daysInMonth; day++) {
      cum += dailyMap[day] || 0;
      actualData.push(day <= dayOfMonth ? cum + farmingMrr : null);
    }
    // last known point + farming spread evenly back to day 1 already accounted above

    // Ideal line: linear 0 → totalGoal
    const idealData = Array.from({length: daysInMonth}, (_, i) => Math.round(totalGoal / daysInMonth * (i + 1)));

    // Projection: from today at current pace
    const realizedToday = actualData[dayOfMonth - 1] || 0;
    const paceActual    = dayOfMonth > 0 ? realizedToday / dayOfMonth : 0;
    const projData      = Array.from({length: daysInMonth}, (_, i) => {
      const day = i + 1;
      if (day < dayOfMonth) return null;
      return Math.round(realizedToday + paceActual * (day - dayOfMonth));
    });

    _goalsBurnupChart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Meta Ideal',
            data: idealData,
            borderColor: 'rgba(255,255,255,.18)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointRadius: 0,
            fill: false,
            tension: 0,
          },
          {
            label: 'Realizado',
            data: actualData,
            borderColor: '#00c896',
            backgroundColor: 'rgba(0,200,150,.08)',
            borderWidth: 2.5,
            pointRadius: 0,
            pointHoverRadius: 5,
            fill: true,
            tension: 0,
            spanGaps: false,
          },
          {
            label: 'Projeção',
            data: projData,
            borderColor: '#388bff',
            borderWidth: 1.5,
            borderDash: [5, 4],
            pointRadius: 0,
            fill: false,
            tension: 0,
            spanGaps: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#131a26',
            borderColor: 'rgba(255,255,255,.08)',
            borderWidth: 1,
            titleColor: '#cdd9e5',
            bodyColor: '#768390',
            padding: 10,
            callbacks: {
              title: items => `Dia ${items[0].label}`,
              label: item => {
                if (item.raw == null) return null;
                const labels2 = ['Meta Ideal', 'Realizado', 'Projeção'];
                return ` ${labels2[item.datasetIndex]}: ${fmtBRL(item.raw)}`;
              },
            },
          },
          annotation: totalGoal ? {
            annotations: {
              goal: {
                type: 'line',
                yMin: totalGoal, yMax: totalGoal,
                borderColor: 'rgba(255,255,255,.25)',
                borderWidth: 1,
                borderDash: [2, 4],
                label: { content: 'Meta', display: true, position: 'end', color: 'rgba(255,255,255,.4)', font: { size: 10 } },
              },
            },
          } : undefined,
        },
        scales: {
          x: {
            grid:  { color: 'rgba(255,255,255,.04)' },
            ticks: { color: '#768390', font: { size: 10, family: 'Inter' }, maxTicksLimit: 10 },
            border: { color: 'rgba(255,255,255,.07)' },
          },
          y: {
            grid:  { color: 'rgba(255,255,255,.04)' },
            ticks: { color: '#768390', font: { size: 10, family: 'Inter' }, callback: v => 'R$' + (v >= 1000 ? Math.round(v/1000)+'k' : v) },
            border: { color: 'rgba(255,255,255,.07)' },
          },
        },
      },
    });
  } catch(err) { console.error('[renderGoalBurnup]', err); }
}

function renderSourceFunnelChart(rows) {
  const wrap = document.getElementById('source-funnel-chart-wrap');
  if (!wrap) return;
  if (!rows || !rows.length) { wrap.innerHTML = ''; return; }

  // Grid igual ao Funil Semanal: linhas = estágios, colunas = origens
  const globalMax = Math.max(...SF_STAGES.flatMap(f => rows.map(r => r[f] || 0)), 1);
  const colStyle  = `grid-template-columns: 152px repeat(${rows.length}, 1fr)`;

  const headers = rows.map((r, i) =>
    `<div class="wf-gh center" style="color:${SF_COLORS[i % SF_COLORS.length]}">${r.source}</div>`
  ).join('');

  const stageRows = SF_STAGES.map((field, si) => {
    const cells = rows.map((r, i) => {
      const cnt = r[field] || 0;
      const pct = cnt > 0 ? Math.max(cnt / globalMax * 100, 14) : 0;
      const bar = cnt > 0
        ? `<div class="wf-mini" style="width:${pct}%;background:${SF_COLORS[i % SF_COLORS.length]}">${cnt}</div>`
        : `<div style="font-size:11px;color:var(--text3);padding-left:2px">—</div>`;
      return `<div class="wf-cell">${bar}</div>`;
    }).join('');
    const isWon  = field === 'won';
    const lblStyle = isWon ? 'color:var(--won);font-weight:600' : '';
    return `<div class="wf-sl" style="${lblStyle}">${SF_LABELS[si]}</div>${cells}`;
  }).join('');

  wrap.innerHTML = `<div class="wf-grid" style="${colStyle}">
    <div class="wf-gh">Estágio</div>${headers}
    ${stageRows}
  </div>`;
}

// Mapa: stage_id → campo em calcPeriodMetrics
const FUNNEL_STAGE_FIELD = {
  '459596268': 'new_deals',
  '459596269': 'assessments',
  '471108325': 'demos',
  '459596270': 'proposals',
  '459596271': 'verbals',
  '459596272': 'contracts',
};

function updateFunnelBars(cw) {
  const vals = Object.entries(FUNNEL_STAGE_FIELD).map(([, f]) => cw[f] || 0);
  const maxVal = Math.max(...vals, 1);
  for (const [sid, field] of Object.entries(FUNNEL_STAGE_FIELD)) {
    const cnt = cw[field] || 0;
    const w   = Math.max(Math.round(cnt / maxVal * 100), 8);
    const bar = document.getElementById('funnel-bar-' + sid);
    const num = document.getElementById('funnel-n-' + sid);
    const conv = document.getElementById('funnel-conv-' + sid);
    if (bar) bar.style.width = w + '%';
    if (num) num.textContent = cnt;
    if (conv) conv.textContent = '';  // conv não faz sentido no modo atividade
  }
}

function applyPeriodData(cw, byOwner, sources, label, prevMetrics = null, mktFunnel = null, lostReasons = null, segmentsPeriod = null, sourceFunnel = null, wonDeals = null, periodWeeks = null) {
  ACTIVE_PERIOD_LABEL = label;
  document.getElementById('period-label').textContent = label;

  const setEl = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };

  setEl('kpi-new-deals', `<div class="kpi-label">Novos Deals</div><div class="kpi-value" style="color:var(--accent2)">${cw.new_deals}</div>${prevMetrics ? delta(cw.new_deals, prevMetrics.new_deals, '') : ''}`);
  setEl('kpi-won',       `<div class="kpi-label">Deals Ganhos</div><div class="kpi-value" style="color:var(--won)">${cw.won}</div><div class="kpi-delta" style="color:var(--text2)">MRR: ${fmtBRL(cw.new_mrr)}</div>`);
  setEl('kpi-lost',      `<div class="kpi-label">Deals Perdidos</div><div class="kpi-value" style="color:var(--lost)">${cw.lost}</div><div class="kpi-delta down">${cw.won + cw.lost > 0 ? '↓ Taxa: ' + fmtPct(cw.lost/(cw.won+cw.lost)*100) : '—'}</div>`);

  // Atualiza KPIs de atividade por estágio (Overview)
  const setTxt = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  setTxt('kpi-assessments', cw.assessments || 0);
  setTxt('kpi-demos',       cw.demos || 0);
  setTxt('kpi-proposals',   cw.proposals || 0);
  setTxt('kpi-won-mrr',     fmtBRL(cw.new_mrr));

  // Atualiza funil de vendas — todos os bars por estágio
  updateFunnelBars(cw);
  setTxt('funnel-won-count',    cw.won);
  setTxt('funnel-lost-count',   cw.lost);
  setTxt('funnel-badge-won-n',  cw.won);
  setTxt('funnel-badge-lost-n', cw.lost);

  // Atualiza Funil Completo — atividade no período
  setTxt('fa-new',  cw.new_deals   || 0);
  setTxt('fa-ass',  cw.assessments || 0);
  setTxt('fa-demo', cw.demos       || 0);
  setTxt('fa-prop', cw.proposals   || 0);
  setTxt('fa-won',  cw.won         || 0);
  setTxt('fa-lost', cw.lost        || 0);
  setTxt('funnel-period-label', label);

  renderTeamTable(byOwner, label);
  renderSourcesChart(sources);

  // Sincroniza Funil Semanal com o período selecionado
  if (periodWeeks && periodWeeks.length) updateWeeklyFunnel(periodWeeks);

  // Atualiza "No Período" nos cards individuais
  if (byOwner) {
    const sI = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    byOwner.forEach(o => {
      const oid = o.owner_id;
      sI(`i3-per-new-${oid}`,  o.new_this_period         || 0);
      sI(`i3-per-ass-${oid}`,  o.assessments_this_period || 0);
      sI(`i3-per-dem-${oid}`,  o.demos_this_period       || 0);
      sI(`i3-per-prop-${oid}`, o.proposals_this_period   || 0);
      sI(`i3-per-won-${oid}`,  o.won_this_period         || 0);
      sI(`i3-per-lost-${oid}`, o.lost_this_period        || 0);
    });
  }

  // Atualiza MKT funnel — período selecionado
  const mkt = mktFunnel || {};
  const setMkt = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  const mqlV = mkt.mql || 0, sqlV = mkt.sql || 0;
  const convRate = mqlV > 0 ? Math.round(sqlV / mqlV * 1000) / 10 : 0;
  setMkt('mkt-mql',       mqlV);
  setMkt('mkt-sql',       sqlV);
  setMkt('mkt-conv-rate', mqlV > 0 ? convRate + '%' : '—');
  setMkt('mkt-period-label', label);

  // SQL breakdown by source
  const sqlSourcesEl = document.getElementById('mkt-sql-sources');
  if (sqlSourcesEl) {
    const sqlBySource = mkt.sql_by_source || [];
    if (sqlBySource.length > 0) {
      sqlSourcesEl.innerHTML = `
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">SQL por Canal</div>
        ${sqlBySource.map(s => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <div style="flex:1;font-size:12px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.source}</div>

async function forceRefresh() {
  try {
    const resp = await fetch('/api/snapshot?force=1');
    const body = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    if (!resp.ok) throw new Error(body?.error || `HTTP ${resp.status}`);
    DATA = body;
    buildUI(DATA);
  } catch (err) {
    alert('Erro ao atualizar: ' + err.message);
  }
}

async function init() {
  try {
    const [snapshotResp, farmingResp, forecastResp] = await Promise.all([
      fetch('/api/snapshot?force=1'),
      fetch('/api/storage?tab=farming').catch(() => null),
      fetch('/api/storage?tab=forecast').catch(() => null),
    ]);

    const farmingRemote  = farmingResp  ? await farmingResp.json().catch(() => null)  : null;
    const forecastRemote = forecastResp ? await forecastResp.json().catch(() => null) : null;

    // Fallback: dados do localStorage para migração
    const localFarming  = JSON.parse(localStorage.getItem('moveo_farming_data')  || '[]');
    const localFcDeals  = JSON.parse(localStorage.getItem('moveo_forecast_deals') || '[]');

    // Inicializa caches — prefere Apps Script, cai no localStorage
    FARMING_CACHE = Array.isArray(farmingRemote) && farmingRemote.length > 0
      ? farmingRemote : localFarming;

    FORECAST_CACHE = forecastRemote && Array.isArray(forecastRemote.deals)
      ? { backlog: [], prio: {}, ...forecastRemote }
      : (() => {
          // Reconstrói ps/obs do localStorage ao migrar
          const ps = {}, obs = {};
          for (const id of localFcDeals) {
            const p = localStorage.getItem('moveo_fc_ps_'  + id);
            const o = localStorage.getItem('moveo_fc_obs_' + id);
            if (p) ps[id]  = parseFloat(p) || 0;
            if (o) obs[id] = o;
          }
          return { deals: localFcDeals, ps, obs, backlog: [], prio: {} };
        })();

    // Migração única: se Apps Script estava vazio mas localStorage tinha dados, sobe
    if (Array.isArray(farmingRemote) && farmingRemote.length === 0 && localFarming.length > 0)
      saveToStorage('farming', localFarming);
    if (forecastRemote && Array.isArray(forecastRemote.deals) && forecastRemote.deals.length === 0 && localFcDeals.length > 0)
      saveToStorage('forecast', FORECAST_CACHE);

    const body = await snapshotResp.json().catch(() => ({ error: `HTTP ${snapshotResp.status} (sem body)` }));
    if (!snapshotResp.ok) throw new Error(body?.error || `HTTP ${snapshotResp.status}`);
    DATA = body;
    buildUI(DATA);
    const now = new Date();
    const y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,'0');
    fetchCampaigns(`${y}-${mo}-01`, now.toISOString().slice(0,10));
  } catch (err) {
    document.getElementById('app-content').innerHTML = `
      <div class="error">
        <p>⚠️ Erro ao carregar dados do HubSpot</p>
        <p style="margin-top:8px;color:var(--text2)">Verifique se <code>HUBSPOT_ACCESS_TOKEN</code> está configurado na Vercel.</p>
        <p style="margin-top:4px;font-size:11px;color:#ff6b6b">${err.message}</p>
      </div>`;
    document.getElementById('sync-status').textContent = '❌ Sem dados';
  }
}

// ── Auth Gate ────────────────────────────────────────────────────────────────
const AUTH_HASH = 'e57dcca216d2b869374b39b970248aa2a3149ad15dfdf94217b15406646af56b';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const AUTH_CACHE_KEY = 'moveo_auth_v2';
const AUTH_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 1 semana em ms

async function doLogin() {
  const pwd = document.getElementById('login-input').value;
  const hash = await sha256(pwd);
  if (hash === AUTH_HASH) {
    localStorage.setItem(AUTH_CACHE_KEY, JSON.stringify({ hash, exp: Date.now() + AUTH_CACHE_TTL }));
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('app-wrap').style.display = '';
    init();
  } else {
    const err = document.getElementById('login-err');
    err.textContent = 'Senha incorreta';
    document.getElementById('login-input').value = '';
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}

(async () => {
  try {
    const cached = JSON.parse(localStorage.getItem(AUTH_CACHE_KEY) || 'null');
    if (cached && cached.hash === AUTH_HASH && cached.exp > Date.now()) {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('app-wrap').style.display = '';
      init();
      return;
    }
  } catch (_) {}
  // else: login gate já visível, aguarda input
})();

function renderCampBoxes(camps, isG) {
  const badgeBg    = isG ? 'rgba(56,139,255,.15)' : 'rgba(244,114,182,.15)';
  const badgeColor = isG ? '#388bff' : '#f472b6';
  const badgeLbl   = isG ? 'G' : 'M';

    html += `<div class="cf-arr-sp"></div><div class="cf-hcol ${isW?'h-won':isL?'h-lost':''}">${CAMP_SL[s]}</div>`;
  });
  html += `</div>`;

  camps.forEach((camp, i) => {
    const color = campColor(i);
    const rgb   = hexRgb(color);
    const bd    = `rgba(${rgb},.38)`;
    const bg    = `rgba(${rgb},.07)`;

    html += `<div class="cf-row"><div class="cf-left">
      <div class="cf-ch-badge" style="background:${badgeBg};color:${badgeColor}">${badgeLbl}</div>
      <div class="cf-camp-box" style="border-color:${bd};background:${bg};color:${color}" title="${camp.name}">${camp.name}</div>
    </div>`;

    html += campFSbox(camp.total, color, bd, bg, 'Deals', camp.stages.all || [], camp);

    CAMP_STAGES.forEach(s => {
      const n   = (camp.stages[s]||[]).length;
      const isW = s==='won', isL = s==='lost';
      const d   = camp.stages[s] || [];
      const sbd = isW ? `rgba(0,200,150,${n?'.4':'.1'})` : isL ? `rgba(255,83,112,${n?'.4':'.1'})` : (n ? bd : 'var(--border)');

      const sc  = isW ? (n?'var(--won)':'var(--text3)') : isL ? (n?'var(--lost)':'var(--text3)') : (n ? color : 'var(--text3)');
      html += campFSbox(n, sc, sbd, sbg, CAMP_SL[s], d, camp);
    });

    html += `</div>`;
  });

  return html;
}

function campFSbox(n, color, bd, bg, label, deals, camp) {
  const idx = _campTtData.length;
  _campTtData.push({ camp, stage: label, deals });
  return `<div class="cf-arr">›</div>
    <div class="cf-sbox" style="border-color:${bd};background:${bg}"
      onmouseenter="showCampTt(event,${idx})" onmouseleave="hideCampTt()">
      <span class="cf-sn" style="color:${color}">${n}</span>
      <span class="cf-sl" style="color:${color}">${label}</span>
    </div>`;
}

    funnelWrap.innerHTML = stages.map(s => {
      const n = (camp.stages[s]||[]).length;
      const h = Math.max(Math.round(n / maxN * 34), n > 0 ? 4 : 1);
      const clr = STAGE_CLR[s] || 'var(--text3)';
      const active = stageLbl === s || stageLbl === CAMP_SL[s] ? 'filter:brightness(1.4);outline:1px solid ' + clr + ';' : '';
      return `<div class="ctt-bar-wrap">
        <div class="ctt-bar-n" style="color:${n?clr:'var(--text3)'}">${n}</div>
        <div class="ctt-bar" style="height:${h}px;background:${n?clr:'rgba(255,255,255,.06)'};${active}"></div>
        <div class="ctt-bar-lbl">${CAMP_SL[s]?.slice(0,4)}</div>
      </div>`;
    }).join('');
    if (sep) sep.style.display = 'block';
  }

  // Deal list with current stage badge
  const shown = d.deals.slice(0, 6);
  const more  = d.deals.length - 6;
  document.getElementById('camp-tt-body').innerHTML = shown.map(x => {
    const dt  = x.created ? x.created.slice(0,10).split('-').reverse().join('/') : '';
    const cs  = x.current_stage || '';
    const clr = STAGE_CLR[cs] || 'var(--text2)';
    const lbl = CAMP_SL[cs] || cs;
    const badge = cs ? `<span class="ctt-sbadge" style="background:${clr}20;color:${clr};border:1px solid ${clr}50">${lbl}</span>` : '';
    return `<div class="ctt-item">
      <div class="ctt-dn">${x.name || 'Deal #' + x.id}</div>
      <div class="ctt-row">
        ${x.owner ? `<span class="ctt-own">${x.owner}</span>` : ''}
        ${dt ? `<span style="color:var(--text3)">· ${dt}</span>` : ''}
        ${x.amount > 0 ? `<span class="ctt-amt" style="margin-left:auto">${fmtBRL(x.amount)}</span>` : ''}
        ${badge}
      </div>
    </div>`;
  }).join('') + (more > 0 ? `<div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:center">+${more} mais…</div>` : '');

  moveCampTt(e);
  tt.classList.add('vis');
}

function hideCampTt() { getCampTT()?.classList.remove('vis'); }
function moveCampTt(e) {
  const tt = getCampTT(); if (!tt) return;
  const tw = tt.offsetWidth || 280, th = tt.offsetHeight || 160;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - 14;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - 14;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
document.addEventListener('mousemove', e => { if (getCampTT()?.classList.contains('vis')) moveCampTt(e); });

async function fetchCampaigns(from, to) {
  _campLastRange = [from, to];
  const wrap = document.getElementById('camp-funnel-wrap');
  if (wrap) wrap.innerHTML = '<div style="color:var(--text2);font-size:12px;padding:12px 0;text-align:center">🔄 Carregando campanhas…</div>';
  try {
    const r = await fetch(`/api/campaigns?from=${from}&to=${to}&attr=${CAMP_ATTR}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderCampFunnel(data);
  } catch(e) {
    if (wrap) wrap.innerHTML = `<div style="color:var(--lost);font-size:12px;padding:12px 0;text-align:center">Erro ao carregar campanhas: ${e.message}</div>`;
  }
}
</script>
</div><!-- /app-wrap -->
</body>
